      display: "standalone",
      background_color: "#FCF8FF",
      theme_color: "#9B5DE5",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%239B5DE5'/%3E%3Cpath d='M50 20 C60 40 85 45 85 70 C85 95 60 100 50 80 C40 100 15 95 15 70 C15 45 40 40 50 20 Z' fill='white'/%3E%3C/svg%3E",
        sizes: "192x192 512x512",

      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

  <script type="importmap">
    {
      "imports": {

        extend: { 
          colors: {

              surface: 'var(--theme-surface)',
              accent: 'var(--theme-accent)'
            }
          },
          fontFamily: {

            serif: ['Instrument Serif', 'serif']

        } 
      } 
    }

  <style>
    body { background-color: var(--theme-bg); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; transition: background-color 0.5s ease; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--theme-surface); border-radius: 20px; border: 1px solid var(--theme-bg); }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--theme-sec); }
    @media print { .print\:hidden { display: none !important; } body { background: white !important; } main { overflow: visible !important; } }

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      CheckCircle2, Circle, BookOpen, Calendar, ChevronRight, Edit3, Printer, PlusCircle, Layout, Clock, ArrowLeft, ArrowRight, User, Eye, EyeOff, Droplet, Moon, Dumbbell, Quote, GraduationCap, Download, Trash2, Lock, Settings, Plus, Check, ListChecks, ClipboardList, History, Sparkles, Flower2, Upload, RefreshCw, Image as ImageIcon, Smile, Meh, Frown, Monitor, TrendingUp, CalendarDays, RotateCcw, X, AlertCircle, Wallet, CreditCard, Receipt, PiggyBank, ArrowUpRight, ArrowDownLeft, ImagePlus, Palette, PieChart, BarChart3, Calculator, AlertTriangle, HeartPulse, Utensils, Flame, Activity, Coffee, Play
    } from 'lucide-react';

    // DICCIONARIO DE TEMAS
    const THEMES = {
      jacaranda: { main: '#9B5DE5', sec: '#BE95C4', dark: '#5E548E', bg: '#FCF8FF', surface: '#F7EFFF', accent: '#E0B1CB' },
      prada: { main: '#D90429', sec: '#8D0801', dark: '#111111', bg: '#F9F9F9', surface: '#F0F0F0', accent: '#EF233C' },
      matcha: { main: '#588157', sec: '#A3B18A', dark: '#344E41', bg: '#FAFAED', surface: '#F1F4E8', accent: '#DAD7CD' }
    };

    // CATÁLOGO DE EJERCICIOS
    const GYM_CATALOG = [
      // TREN INFERIOR
      { id: 'TI1', name: 'Sentadilla libre', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TI2', name: 'Puente de glúteos', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 26 },
      { id: 'TI3', name: 'Extension de pierna maquina', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 14 },
      { id: 'TI4', name: 'Desplante en máquina Smith', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TI5', name: 'Adduccion en maquina', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 14 },
      { id: 'TI6', name: 'Curl Femoral Tumbado', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 8 },
      { id: 'TI7', name: 'Hiperextensiones (en banco a 45°)', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TI8', name: 'Paso del granjero', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 4 },
      { id: 'TI9', name: 'Peso muerto Rumano', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 10 },
      
      // TREN SUPERIOR
      { id: 'TS1', name: 'Dominada Supina', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS2', name: 'Dominada Prona', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS3', name: 'Fondos (en barras paralelas)', target: 'Tren Superior', defaultSeries: 2, defaultReps: 13 },
      { id: 'TS4', name: 'Press de Pecho Vertical', target: 'Tren Superior', defaultSeries: 2, defaultReps: 12 },
      { id: 'TS5', name: 'Jalón unilateral en polea, sentado', target: 'Tren Superior', defaultSeries: 2, defaultReps: 15 },
      { id: 'TS6', name: 'Curl predicador con mancuerna', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS7', name: 'Extensión de tríceps sobre la cabeza', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS8', name: 'Push-ups / Flexiones', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 }
    ];

    const App = () => {
      // --- ESTADOS PRINCIPALES ---
      const [viewMode, setViewMode] = useState('welcome'); 
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [isPrivateMode, setIsPrivateMode] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [importType, setImportType] = useState('topics'); 
      const [importText, setImportText] = useState("");
      const [coverImage, setCoverImage] = useState(localStorage.getItem('bitacora_cover_img') || null);
      
      const [showResetModal, setShowResetModal] = useState(false);
      const [showFactoryResetModal, setShowFactoryResetModal] = useState(false);
      const [toastMsg, setToastMsg] = useState(null);
      const [currentCalMonth, setCurrentCalMonth] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
      const [showEventModal, setShowEventModal] = useState({ show: false, date: null, text: '' });
      const [scheduleModal, setScheduleModal] = useState({ show: false, itemType: null, itemId: null, itemName: '', date: selectedDate });
      
      // Finanzas Modales
      const [showExpenseModal, setShowExpenseModal] = useState(false);
      const [showFixedModal, setShowFixedModal] = useState(false);
      const [editingGroup, setEditingGroup] = useState(null);
      const [groupToDelete, setGroupToDelete] = useState(null);
      
      // Gym Modales
      const [showGymModal, setShowGymModal] = useState(false);

      const fileInputRef = useRef(null);

      // ESTADOS FORMULARIOS
      const [expForm, setExpForm] = useState({ amount: '', concept: '', accountId: '' });
      const [fixForm, setFixForm] = useState({ name: '', amount: '', current: '', total: '', accountId: '' });
      const [accForm, setAccForm] = useState({ name: '', cut: '', pay: '' });
      const [groupForm, setGroupForm] = useState({ name: '', subj: '', time: '08:00' });
      const [newQuote, setNewQuote] = useState(''); 

      // --- PERSISTENCIA GRUPOS ---
      const [groups, setGroups] = useState(() => {
        const saved = localStorage.getItem('bitacora_grupos_v18') || localStorage.getItem('bitacora_grupos_v17') || localStorage.getItem('bitacora_grupos_v16');
        if (saved) {
          return JSON.parse(saved).map(g => ({ ...g, time: g.time || '08:00' }));
        }
        return [{ 
          id: 'G1', name: 'Grupo 101', subject: 'Diseño Urbano I', color: '#BE95C4', time: '07:00',
          topics: [{ id: 1, title: 'Introducción al Urbanismo Sistémico', completed: false }],
          adas: [{ id: 101, title: 'ADA 1: Mapa Conceptual', completed: false }],
          sessions: [], tasks: []
        }];
      });

      // --- PERSISTENCIA PERSONAL, FINANZAS Y SALUD ---
      const [personalData, setPersonalData] = useState(() => {
        const saved = localStorage.getItem('bitacora_personal_v18') || localStorage.getItem('bitacora_personal_v17') || localStorage.getItem('bitacora_personal_v16');
        const baseData = {
          appTitle: 'Agenda - Bitácora', 
          theme: 'jacaranda', 
          habits: { exercise: false }, 
          waterLogs: {}, 
          sleep: { start: '22:00', end: '06:00' }, screenTime: 4, tasks: [],
          quotes: ["La arquitectura es música congelada."], activeQuoteIndex: 0,
          habitMatrix: {}, moodLogs: {}, calendarEvents: {},
          finance: { 
             accounts: [
                { id: 'A1', name: 'Banorte', type: 'Crédito', cutDate: '15', payDate: '05' },
                { id: 'A2', name: 'Efectivo (Billetera)', type: 'Efectivo', cutDate: '-', payDate: '-' }
             ], 
             transactions: [], fixedPayments: [] 
          },
          health: {
             meals: {}, 
             workouts: {}
          }
        };
        
        if (saved) {
           const parsed = JSON.parse(saved);
           
           // BLINDAJE DE FINANZAS PARA EVITAR PANTALLAS EN BLANCO
           const safeFinance = {
              accounts: parsed.finance?.accounts || baseData.finance.accounts,
              transactions: parsed.finance?.transactions || [],
              fixedPayments: parsed.finance?.fixedPayments || []
           };

           if (!safeFinance.accounts.some(a => a.name.includes('Efectivo'))) {
              safeFinance.accounts.push({ id: 'A2', name: 'Efectivo (Billetera)', type: 'Efectivo', cutDate: '-', payDate: '-' });
           }
           if(!parsed.appTitle) parsed.appTitle = 'Agenda - Bitácora';
           
           return { 
              ...baseData, 
              ...parsed, 
              finance: safeFinance, 
              waterLogs: parsed.waterLogs || {}, 
              health: parsed.health || { meals: {}, workouts: {} } 
           };
        }
        return baseData;
      });

      const [activeGroupId, setActiveGroupId] = useState(groups[0]?.id);

      useEffect(() => { localStorage.setItem('bitacora_grupos_v17', JSON.stringify(groups)); }, [groups]);
      useEffect(() => { localStorage.setItem('bitacora_personal_v17', JSON.stringify(personalData)); }, [personalData]);

      // Efecto para cambiar el título de la pestaña del navegador
      useEffect(() => {
         document.title = personalData.appTitle || 'Agenda - Bitácora';
      }, [personalData.appTitle]);

      const activeTheme = THEMES[personalData.theme || 'jacaranda'];

      // --- DERIVADOS ---
      const activeGroup = useMemo(() => groups.find(g => g.id === activeGroupId), [groups, activeGroupId]);
      const weekDays = useMemo(() => {
        const dt = new Date(selectedDate + 'T12:00:00');
        const day = dt.getDay();
        const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(dt.setDate(diff));
        return Array.from({length: 7}, (_, i) => {
          const d = new Date(monday); d.setDate(monday.getDate() + i);
          return d.toISOString().split('T')[0];
        });
      }, [selectedDate]);

      const calculateGrading = (group) => {
        if (!group?.adas?.length) return 0;
        return Math.round((group.adas.filter(a => a.completed).length / group.adas.length) * 100);
      };

      const globalPendingTasks = useMemo(() => {
        return groups.flatMap(g => (g.tasks || []).filter(t => !t.done).map(t => ({ ...t, groupName: g.name, color: g.color, groupId: g.id })));
      }, [groups]);

      // --- ACCIONES SALUD & GYM ---
      const setMeal = (type, value) => {
        setPersonalData(prev => ({ ...prev, health: { ...prev.health, meals: { ...prev.health.meals, [selectedDate]: { ...(prev.health.meals[selectedDate] || {}), [type]: value } } } }));
      };
      
      const setWorkoutGeneral = (field, value) => {
        setPersonalData(prev => ({ ...prev, health: { ...prev.health, workouts: { ...prev.health.workouts, [selectedDate]: { ...(prev.health.workouts[selectedDate] || { exercises: [] }), [field]: value } } } }));
      };

      const loadRoutine = (target) => {
        const routineExercises = GYM_CATALOG.filter(e => e.target === target).map(e => ({
          id: Date.now() + Math.random(),
          name: e.name,
          series: e.defaultSeries,
          reps: e.defaultReps,
          weight: 0,
          done: false
        }));
        
        setPersonalData(prev => {
          const currentDay = prev.health.workouts[selectedDate] || { exercises: [] };
          return {
            ...prev,
            health: {
              ...prev.health,
              workouts: {
                ...prev.health.workouts,
                [selectedDate]: {
                  ...currentDay,
                  type: target,
                  exercises: [...currentDay.exercises, ...routineExercises]
                }
              }
            }
          };
        });
        showToast(`Rutina de ${target} cargada`);
      };

      const updateGymExercise = (exId, field, value) => {
         setPersonalData(prev => {
            const currentDay = prev.health.workouts[selectedDate];
            if (!currentDay) return prev;
            return {
               ...prev,
               health: {
                  ...prev.health,
                  workouts: {
                     ...prev.health.workouts,
                     [selectedDate]: {
                        ...currentDay,
                        exercises: currentDay.exercises.map(ex => ex.id === exId ? { ...ex, [field]: value } : ex)
                     }
                  }
               }
            };
         });
      };

      const deleteGymExercise = (exId) => {
         setPersonalData(prev => {
            const currentDay = prev.health.workouts[selectedDate];
            if (!currentDay) return prev;
            return {
               ...prev,
               health: {
                  ...prev.health,
                  workouts: {
                     ...prev.health.workouts,
                     [selectedDate]: {
                        ...currentDay,
                        exercises: currentDay.exercises.filter(ex => ex.id !== exId)
                     }
                  }
               }
            };
         });
      };

      const currentMeals = personalData.health.meals[selectedDate] || { desayuno: '', comida: '', cena: '', snacks: '' };
      const currentWorkout = personalData.health.workouts[selectedDate] || { type: '', duration: '', energy: 0, exercises: [] };

      // --- ACCIONES GENERALES ---
      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 3000); };
      const addSession = (type, contentId, dateStr) => {
        const newSession = { id: Date.now(), date: dateStr, type, contentId, notes: "", completed: false };
        setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, sessions: [...(g.sessions || []), newSession].sort((a,b) => new Date(a.date)-new Date(b.date)) } : g));
        showToast("Programado");
      };

      // --- GESTIÓN DE GRUPOS ---
      const addNewGroup = (name, subject, time) => {
        if(!name || !subject) return;
        const newGroup = { id: 'G' + Date.now(), name, subject, time: time || '08:00', color: ['#9B5DE5', '#BE95C4', '#E0B1CB', '#5E548E', '#9A8C98'][Math.floor(Math.random() * 5)], topics: [], adas: [], sessions: [], tasks: [] };
        setGroups([...groups, newGroup].sort((a,b) => a.time.localeCompare(b.time)));
        if(!activeGroupId) setActiveGroupId(newGroup.id);
        showToast("Nuevo grupo creado");
      };
      const updateGroup = () => {
        if(!editingGroup || !editingGroup.name || !editingGroup.subject) return;
        setGroups(prev => prev.map(g => g.id === editingGroup.id ? { ...g, name: editingGroup.name, subject: editingGroup.subject, time: editingGroup.time } : g).sort((a,b) => a.time.localeCompare(b.time)));
        setEditingGroup(null);
        showToast("Información del grupo actualizada");
      };
      const deleteGroup = () => {
        if(!groupToDelete) return;
        setGroups(prev => prev.filter(g => g.id !== groupToDelete.id));
        if(activeGroupId === groupToDelete.id) {
          const remaining = groups.filter(g => g.id !== groupToDelete.id);
          setActiveGroupId(remaining.length > 0 ? remaining[0].id : null);
        }
        setGroupToDelete(null);
        showToast("Grupo eliminado");
      };

      const handleFactoryReset = () => {
        localStorage.clear();
        setGroups([{ id: 'G1', name: 'Nuevo Grupo', subject: 'Materia...', color: '#BE95C4', time: '08:00', topics: [], adas: [], sessions: [], tasks: [] }]);
        setPersonalData({
          appTitle: 'Agenda - Bitácora',
          theme: 'jacaranda', habits: { exercise: false }, waterLogs: {},
          sleep: { start: '22:00', end: '06:00' }, screenTime: 4, tasks: [],
          quotes: ["La arquitectura es música congelada."], activeQuoteIndex: 0,
          habitMatrix: {}, moodLogs: {}, calendarEvents: {},
          finance: { accounts: [], transactions: [], fixedPayments: [] },
          health: { meals: {}, workouts: {} }
        });
        setCoverImage(null); setShowFactoryResetModal(false); setActiveGroupId('G1'); setViewMode('welcome');
        showToast("¡Agenda reseteada a estado de fábrica!");
      };

      const toggleStatus = (type, id, groupId = activeGroupId) => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, [type]: g[type].map(item => item.id === id ? { ...item, completed: !item.completed } : item) } : g));
      const deleteItem = (type, id) => setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, [type]: g[type].filter(item => item.id !== id) } : g));
      const updateSessionNotes = (sessionId, notes) => setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, sessions: g.sessions.map(s => s.id === sessionId ? { ...s, notes } : s) } : g));
      const addGroupTask = (text) => { if(text) setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, tasks: [...(g.tasks || []), { id: Date.now(), text, done: false }] } : g)); };
      const toggleGroupTask = (taskId, groupId = activeGroupId) => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, tasks: (g.tasks || []).map(t => t.id === taskId ? { ...t, done: !t.done } : t) } : g));
      const deleteGroupTask = (taskId, groupId = activeGroupId) => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, tasks: (g.tasks || []).filter(t => t.id !== taskId) } : g));
      const toggleSessionStatus = (groupId, sessionId) => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, sessions: g.sessions.map(s => s.id === sessionId ? { ...s, completed: !s.completed } : s) } : g));

      // --- FINANZAS BLINDADAS ---
      const formatMoney = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);
      const addTransaction = (amount, concept, accountId) => {
        setPersonalData(prev => ({ 
           ...prev, 
           finance: { 
              ...prev.finance, 
              transactions: [{ id: Date.now(), amount: parseFloat(amount), concept, date: selectedDate, accountId, verified: false }, ...(prev.finance?.transactions || [])] 
           } 
        }));
        showToast("Gasto registrado");
      };
      const addFixedPayment = (name, amount, totalMonths, currentMonth, accountId) => {
        setPersonalData(prev => ({ 
           ...prev, 
           finance: { 
              ...prev.finance, 
              fixedPayments: [...(prev.finance?.fixedPayments || []), { id: Date.now(), name, amount: parseFloat(amount), totalMonths: parseInt(totalMonths), currentMonth: parseInt(currentMonth), accountId }] 
           } 
        }));
        showToast("Pago recurrente añadido");
      };
      const toggleVerifyTx = (txId) => setPersonalData(prev => ({ ...prev, finance: { ...prev.finance, transactions: (prev.finance?.transactions || []).map(t => t.id === txId ? { ...t, verified: !t.verified } : t) } }));
      const incrementFixedMonth = (id) => setPersonalData(prev => ({ ...prev, finance: { ...prev.finance, fixedPayments: (prev.finance?.fixedPayments || []).map(f => f.id === id ? { ...f, currentMonth: Math.min(f.totalMonths, f.currentMonth + 1) } : f ) } }));

      // Cálculo a prueba de fallos
      const accountSummaries = useMemo(() => {
        return (personalData.finance?.accounts || []).map(acc => {
          const variableTotal = (personalData.finance?.transactions || []).filter(t => t.accountId === acc.id).reduce((sum, t) => sum + t.amount, 0);
          const fixedTotal = (personalData.finance?.fixedPayments || []).filter(f => f.accountId === acc.id).reduce((sum, f) => sum + f.amount, 0);
          return { ...acc, variableTotal, fixedTotal, total: variableTotal + fixedTotal };
        });
      }, [personalData.finance]);
      
      const grandTotal = accountSummaries.reduce((sum, acc) => sum + acc.total, 0);

      // --- TRACKERS Y CALENDARIO ---
      const toggleMatrixHabit = (habitName, date) => setPersonalData(prev => { const newMatrix = { ...prev.habitMatrix }; if (!newMatrix[habitName]) newMatrix[habitName] = {}; newMatrix[habitName][date] = !newMatrix[habitName][date]; return { ...prev, habitMatrix: newMatrix }; });
      const addNewMatrixHabit = (habitName) => { if(habitName) { setPersonalData(prev => ({ ...prev, habitMatrix: { ...prev.habitMatrix, [habitName]: {} } })); showToast("Hábito añadido"); } };
      const setMood = (date, score) => setPersonalData(prev => ({ ...prev, moodLogs: { ...prev.moodLogs, [date]: score } }));
      const saveCalendarEvent = () => { if(showEventModal.date && showEventModal.text !== null) { setPersonalData(prev => ({ ...prev, calendarEvents: { ...prev.calendarEvents, [showEventModal.date]: showEventModal.text } })); } setShowEventModal({ show: false, date: null, text: '' }); };
      const changeTheme = (themeName) => { setPersonalData(prev => ({...prev, theme: themeName})); showToast(`Tema ${themeName} aplicado`); };
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();

                    <input type="text" value={editingGroup.subject} onChange={e => setEditingGroup({...editingGroup, subject: e.target.value})} placeholder="Materia..." className="w-full p-4 bg-slate-50 rounded-2xl focus:outline-none text-sm italic shadow-inner text-slate-700" />
                    <div className="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl shadow-inner">
                      <Clock size={16} className="text-slate-400"/><input type="time" value={editingGroup.time || '08:00'} onChange={e => setEditingGroup({...editingGroup, time: e.target.value})} className="bg-transparent focus:outline-none text-sm font-bold text-slate-600 flex-1" />
                    </div>
                  </div>
                  <div className="flex gap-4 mt-8">
                    <button onClick={() => setEditingGroup(null)} className="flex-1 p-4 rounded-xl font-bold text-[10px] text-slate-400 hover:bg-slate-50 uppercase tracking-widest">Cancelar</button>
                    <button onClick={updateGroup} className="flex-1 p-4 rounded-xl font-bold text-[10px] bg-theme-main text-white shadow-lg uppercase tracking-widest">Guardar</button>
                  </div>
               </div>
            </div>
          )}

          {scheduleModal.show && (
            <div className="fixed inset-0 z-[70] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6"><div className="bg-white w-full max-w-sm p-8 rounded-[3rem] shadow-2xl"><h3 className="text-2xl font-serif font-bold text-theme-dark italic mb-6 text-center">Programar para...</h3><input type="date" value={scheduleModal.date} onChange={e=>setScheduleModal({...scheduleModal, date: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl border-none mb-6 text-center font-bold text-theme-main"/><div className="flex gap-4"><button onClick={()=>setScheduleModal({show:false})} className="flex-1 p-4 rounded-xl font-bold text-[10px] text-slate-400 uppercase tracking-widest">Cancelar</button><button onClick={()=>{addSession(scheduleModal.itemType, scheduleModal.itemId, scheduleModal.date); setScheduleModal({show:false})}} className="flex-1 p-4 rounded-xl font-bold text-[10px] bg-theme-main text-white uppercase tracking-widest">Aceptar</button></div></div></div>
          )}
          {showEventModal.show && (
            <div className="fixed inset-0 z-[70] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6"><div className="bg-white w-full max-w-sm p-8 rounded-[3rem] shadow-2xl"><h3 className="text-2xl font-serif font-bold text-theme-dark italic mb-2">Añadir Evento</h3><p className="text-xs text-slate-400 mb-6 uppercase tracking-widest">{showEventModal.date}</p><textarea className="w-full h-32 p-4 bg-slate-50 rounded-2xl focus:outline-none text-sm italic shadow-inner resize-none text-slate-700" placeholder="Ej. Examen Parcial..." value={showEventModal.text} onChange={(e) => setShowEventModal({...showEventModal, text: e.target.value})}></textarea><div className="flex gap-4 mt-6"><button onClick={() => setShowEventModal({show:false, date:null, text:''})} className="flex-1 p-4 rounded-xl font-bold text-[10px] text-slate-400 uppercase tracking-widest">Cancelar</button><button onClick={saveCalendarEvent} className="flex-1 p-4 rounded-xl font-bold text-[10px] bg-theme-main text-white uppercase tracking-widest shadow-lg">Guardar</button></div></div></div>
          )}

          {showResetModal && (
            <div className="fixed inset-0 z-[70] bg-red-900/40 backdrop-blur-md flex items-center justify-center p-6"><div className="bg-white w-full max-w-md p-10 rounded-[3rem] shadow-2xl text-center"><AlertCircle size={60} className="text-red-400 mx-auto mb-6" /><h3 className="text-3xl font-serif font-bold text-slate-800 italic mb-4">¿Fin del Ciclo?</h3><p className="text-sm text-slate-500 mb-8 italic leading-relaxed">Se limpiará la bitácora y sesiones de este grupo. Tus catálogos de Temas y ADAs se conservarán.</p><div className="flex gap-4"><button onClick={() => setShowResetModal(false)} className="flex-1 p-5 rounded-2xl font-bold text-[11px] text-slate-500 bg-slate-100 uppercase tracking-widest">Cancelar</button><button onClick={() => { setGroups(prev => prev.map(g => g.id === activeGroupId ? {...g, topics: g.topics.map(t=>({...t, completed:false})), adas: g.adas.map(a=>({...a, completed:false})), sessions: [], tasks: []} : g)); setShowResetModal(false); showToast("Ciclo reseteado"); }} className="flex-1 p-5 rounded-2xl font-bold text-[11px] bg-red-400 text-white uppercase tracking-widest shadow-lg">Resetear</button></div></div></div>
          )}
          {groupToDelete && (
            <div className="fixed inset-0 z-[70] bg-red-900/40 backdrop-blur-md flex items-center justify-center p-6"><div className="bg-white w-full max-w-md p-10 rounded-[3rem] shadow-2xl text-center"><AlertCircle size={60} className="text-red-400 mx-auto mb-6" /><h3 className="text-3xl font-serif font-bold text-slate-800 italic mb-4">¿Eliminar {groupToDelete.name}?</h3><p className="text-sm text-slate-500 mb-8">Esta acción es irreversible. Se perderán todos sus temas, ADAs y notas asociadas.</p><div className="flex gap-4"><button onClick={() => setGroupToDelete(null)} className="flex-1 p-5 rounded-2xl font-bold text-[11px] text-slate-500 bg-slate-100 uppercase tracking-widest">Cancelar</button><button onClick={deleteGroup} className="flex-1 p-5 rounded-2xl font-bold text-[11px] bg-red-400 text-white uppercase tracking-widest shadow-lg">Sí, eliminar</button></div></div></div>
          )}

          {showFactoryResetModal && (
            <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-6 animate-in zoom-in duration-200">
               <div className="bg-white w-full max-w-sm p-10 rounded-[3rem] shadow-2xl text-center">
                  <div className="mx-auto w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-400 mb-6 shadow-inner"><Lock size={24} /></div>
                  <h3 className="text-2xl font-serif font-bold text-slate-800 italic mb-2">Restablecer Agenda</h3>
                  <p className="text-[10px] text-slate-400 mb-6 uppercase tracking-widest font-bold">Requiere Autenticación</p>
                  
                  <input type="password" id="resetPinInput" placeholder="PIN..." className="w-full p-4 mb-6 bg-slate-50 rounded-2xl text-center text-lg font-bold tracking-[0.5em] text-slate-700 focus:outline-none focus:ring-2 focus:ring-theme-surface shadow-inner" maxLength={4}/>

                  <div className="flex gap-4">
                     <button onClick={() => setShowFactoryResetModal(false)} className="flex-1 p-4 rounded-xl font-bold text-[10px] text-slate-400 hover:bg-slate-50 uppercase tracking-widest">Cancelar</button>
                     <button onClick={() => {
                        const pin = document.getElementById('resetPinInput').value;
                        if(pin === '0000') handleFactoryReset();
                        else { showToast("PIN Incorrecto"); document.getElementById('resetPinInput').value = ''; }
                     }} className="flex-1 p-4 rounded-xl font-bold text-[10px] bg-slate-800 text-white uppercase tracking-widest shadow-lg hover:bg-black transition-colors">Verificar</button>
                  </div>
               </div>
            </div>
          )}

          {showExpenseModal && (
            <div className="fixed inset-0 z-[80] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
              <div className="bg-white w-full max-w-sm p-10 rounded-[4rem] shadow-2xl relative">
                <button onClick={()=>setShowExpenseModal(false)} className="absolute top-8 right-8 text-slate-400 hover:text-slate-600"><X/></button>
                <h3 className="text-3xl font-serif font-bold text-theme-dark italic mb-2">Capturar Gasto</h3>
                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8 italic">Para el día: {selectedDate}</p>
                <div className="space-y-4">
                  <div className="relative">
                    <span className="absolute left-4 top-4 font-bold text-slate-400">$</span>
                    <input type="number" value={expForm.amount} onChange={e=>setExpForm({...expForm, amount: e.target.value})} placeholder="0.00" className="w-full p-4 pl-10 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-theme-surface text-lg font-bold text-slate-700" />
                  </div>
                  <input type="text" value={expForm.concept} onChange={e=>setExpForm({...expForm, concept: e.target.value})} placeholder="Concepto (Ej. Súper...)" className="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm italic text-slate-700" />
                  <select value={expForm.accountId} onChange={e=>setExpForm({...expForm, accountId: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl border-none text-xs font-bold uppercase tracking-widest text-slate-700 focus:outline-none focus:ring-2 focus:ring-theme-surface">
                    <option value="" disabled>Selecciona la cuenta...</option>
                    {(personalData.finance?.accounts || []).map(a => <option key={a.id} value={a.id} className="text-slate-700">{a.name}</option>)}
                  </select>
                  <button onClick={() => { 
                    if(expForm.amount && expForm.concept && expForm.accountId) { 
                      addTransaction(expForm.amount, expForm.concept, expForm.accountId); 
                      setShowExpenseModal(false); setExpForm({ amount: '', concept: '', accountId: '' });
                    } else showToast("Llena los campos y selecciona tarjeta");
                  }} className="w-full p-5 bg-theme-dark text-white rounded-3xl font-bold text-xs tracking-[0.2em] uppercase shadow-xl hover:scale-105 transition-all mt-4">Guardar Gasto</button>
                </div>
              </div>
            </div>
          )}
          {showFixedModal && (
            <div className="fixed inset-0 z-[80] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
              <div className="bg-white w-full max-w-sm p-10 rounded-[4rem] shadow-2xl relative">
                <button onClick={()=>setShowFixedModal(false)} className="absolute top-8 right-8 text-slate-400 hover:text-slate-600"><X/></button>
                <h3 className="text-3xl font-serif font-bold text-theme-dark italic mb-6">Nuevo Pago MSI</h3>
                <div className="space-y-4">
                  <input type="text" value={fixForm.name} onChange={e=>setFixForm({...fixForm, name: e.target.value})} placeholder="Nombre (Ej. Laptop)" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-semibold text-slate-700" />
                  <div className="relative">
                    <span className="absolute left-4 top-4 font-bold text-slate-400">$</span>
                    <input type="number" value={fixForm.amount} onChange={e=>setFixForm({...fixForm, amount: e.target.value})} placeholder="Monto mensual" className="w-full p-4 pl-10 bg-slate-50 rounded-2xl text-sm font-bold text-slate-700" />
                  </div>
                  <div className="flex gap-4">
                    <input type="number" value={fixForm.current} onChange={e=>setFixForm({...fixForm, current: e.target.value})} placeholder="Mes actual" className="w-1/2 p-4 bg-slate-50 rounded-2xl text-sm text-slate-700 text-center" />
                    <input type="number" value={fixForm.total} onChange={e=>setFixForm({...fixForm, total: e.target.value})} placeholder="Total meses" className="w-1/2 p-4 bg-slate-50 rounded-2xl text-sm text-slate-700 text-center" />
                  </div>
                  <select value={fixForm.accountId} onChange={e=>setFixForm({...fixForm, accountId: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold uppercase tracking-widest text-slate-700 focus:outline-none focus:ring-2 focus:ring-theme-surface">
                    <option value="" disabled>Selecciona la cuenta...</option>
                    {(personalData.finance?.accounts || []).map(a => <option key={a.id} value={a.id} className="text-slate-700">{a.name}</option>)}
                  </select>
                  <button onClick={() => { 
                    if(fixForm.name && fixForm.amount && fixForm.total && fixForm.accountId) { 
                      addFixedPayment(fixForm.name, fixForm.amount, fixForm.total, fixForm.current || 1, fixForm.accountId); 
                      setShowFixedModal(false); setFixForm({ name: '', amount: '', current: '', total: '', accountId: '' });
                    } else showToast("Llena los campos y selecciona tarjeta");
                  }} className="w-full p-5 bg-theme-sec text-white rounded-3xl font-bold text-xs tracking-widest uppercase shadow-xl mt-4">Programar MSI</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
