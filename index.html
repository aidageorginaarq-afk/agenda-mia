<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FCF8FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bitácora">
  
  <title>Agenda - Bitácora</title>

  <!-- ICONOS PARA LA APP -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%239B5DE5'/%3E%3Cpath d='M50 20 C60 40 85 45 85 70 C85 95 60 100 50 80 C40 100 15 95 15 70 C15 45 40 40 50 20 Z' fill='white'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%239B5DE5'/%3E%3Cpath d='M50 20 C60 40 85 45 85 70 C85 95 60 100 50 80 C40 100 15 95 15 70 C15 45 40 40 50 20 Z' fill='white'/%3E%3C/svg%3E">
  <link id="manifest-link" rel="manifest" href="">

  <script>
    const manifest = {
      name: "Agenda Bitácora Docente",
      short_name: "Bitácora",
      start_url: window.location.pathname,
      display: "standalone",
      background_color: "#FCF8FF",
      theme_color: "#9B5DE5",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%239B5DE5'/%3E%3Cpath d='M50 20 C60 40 85 45 85 70 C85 95 60 100 50 80 C40 100 15 95 15 70 C15 45 40 40 50 20 Z' fill='white'/%3E%3C/svg%3E",
        sizes: "192x192 512x512",
        type: "image/svg+xml",
        purpose: "any maskable"
      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);
  </script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?external=react"
      }
    }
  </script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:italic,wght@0,400;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Instrument Serif', 'serif'] } } } }
  </script>
  
  <style>
    body { background-color: #FCF8FF; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #EBD9FC; border-radius: 20px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #BE95C4; }
    @media print { .print\:hidden { display: none !important; } body { background: white !important; } main { overflow: visible !important; } }
  </style>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      CheckCircle2, Circle, BookOpen, Calendar, ChevronRight, Edit3, Printer, PlusCircle, Layout, Clock, ArrowLeft, ArrowRight, User, Eye, EyeOff, Droplet, Moon, Dumbbell, Quote, GraduationCap, Download, Trash2, Lock, Settings, Plus, Check, ListChecks, ClipboardList, History, Sparkles, Flower2, Upload, RefreshCw, Image as ImageIcon, Smile, Meh, Frown, Monitor, TrendingUp, CalendarDays, RotateCcw, X, AlertCircle
    } from 'lucide-react';

    const App = () => {
      // --- ESTADOS PRINCIPALES ---
      const [viewMode, setViewMode] = useState('welcome'); 
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [isPrivateMode, setIsPrivateMode] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [importType, setImportType] = useState('topics'); 
      const [importText, setImportText] = useState("");
      const [coverImage, setCoverImage] = useState(localStorage.getItem('bitacora_cover_img') || null);
      const [isGeneratingImg, setIsGeneratingImg] = useState(false);
      
      // Modal de Reset y Toast
      const [showResetModal, setShowResetModal] = useState(false);
      const [toastMsg, setToastMsg] = useState(null);
      
      // Calendario y Programación
      const [currentCalMonth, setCurrentCalMonth] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
      const [showEventModal, setShowEventModal] = useState({ show: false, date: null, text: '' });
      const [scheduleModal, setScheduleModal] = useState({ show: false, itemType: null, itemId: null, itemName: '', date: selectedDate });

      // Edición de Grupos
      const [editingGroup, setEditingGroup] = useState(null);
      const [groupToDelete, setGroupToDelete] = useState(null);

      // --- PERSISTENCIA ---
      const [groups, setGroups] = useState(() => {
        const saved = localStorage.getItem('bitacora_grupos_v12') || localStorage.getItem('bitacora_grupos_v11') || localStorage.getItem('bitacora_grupos_v10');
        return saved ? JSON.parse(saved) : [{ 
          id: 'G1', name: 'Grupo 101', subject: 'Diseño Urbano I', color: '#BE95C4', 
          topics: [{ id: 1, title: 'Introducción al Urbanismo Sistémico', completed: true }],
          adas: [{ id: 101, title: 'ADA 1: Mapa Conceptual', completed: true }],
          sessions: [{ id: 501, date: '2024-05-20', type: 'tema', contentId: 1, notes: 'Sesión muy participativa.', completed: true }],
          tasks: []
        }];
      });

      const [personalData, setPersonalData] = useState(() => {
        const saved = localStorage.getItem('bitacora_personal_v12') || localStorage.getItem('bitacora_personal_v11') || localStorage.getItem('bitacora_personal_v10');
        const baseData = {
          habits: { water: 0, exercise: false },
          sleep: { start: '22:00', end: '06:00' }, screenTime: 4, tasks: [],
          quotes: ["La arquitectura es música congelada.", "Menos es más."], activeQuoteIndex: 0,
          habitMatrix: { 'Vitaminas': {}, 'Lectura': {}, 'Skin Care': {} }, moodLogs: {},
          calendarEvents: {} 
        };
        if (saved) {
          const parsed = JSON.parse(saved);
          return { ...baseData, ...parsed, calendarEvents: parsed.calendarEvents || {} };
        }
        return baseData;
      });

      const [activeGroupId, setActiveGroupId] = useState(groups[0]?.id);

      useEffect(() => { localStorage.setItem('bitacora_grupos_v12', JSON.stringify(groups)); }, [groups]);
      useEffect(() => { localStorage.setItem('bitacora_personal_v12', JSON.stringify(personalData)); }, [personalData]);

      // --- DERIVADOS ---
      const activeGroup = useMemo(() => groups.find(g => g.id === activeGroupId), [groups, activeGroupId]);
      const dailySessionsCount = useMemo(() => groups.reduce((acc, g) => acc + (g.sessions?.filter(s => s.date === selectedDate).length || 0), 0), [groups, selectedDate]);
      const calculateGrading = (group) => {
        if (!group?.adas || group.adas.length === 0) return 0;
        const completed = group.adas.filter(a => a.completed).length;
        return Math.round((completed / group.adas.length) * 100);
      };

      const getWeekDays = (dateString) => {
        const dt = new Date(dateString + 'T12:00:00');
        const day = dt.getDay();
        const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(dt.setDate(diff));
        const week = [];
        for(let i=0; i<7; i++) {
           const nextDay = new Date(monday);
           nextDay.setDate(monday.getDate() + i);
           week.push(nextDay.toISOString().split('T')[0]);
        }
        return week;
      };
      const weekDays = getWeekDays(selectedDate);
      const hasActivity = (dStr) => groups.some(g => g.sessions?.some(s => s.date === dStr));

      // Todos los pendientes globales (Para la vista 'Hoy')
      const globalPendingTasks = useMemo(() => {
        return groups.flatMap(g => 
          (g.tasks || []).filter(t => !t.done).map(t => ({ ...t, groupName: g.name, subject: g.subject, groupId: g.id, color: g.color }))
        );
      }, [groups]);

      // --- ACCIONES GENERALES ---
      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(null), 3000);
      };

      const handleImport = () => {
        const lines = importText.split('\n').filter(l => l.trim() !== "");
        const newItems = lines.map((line, index) => ({ id: Date.now() + index, title: line.trim(), completed: false }));
        setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, [importType]: [...g[importType], ...newItems] } : g));
        setImportText(""); setShowImportModal(false);
        showToast("Elementos importados con éxito");
      };

      const handleResetGroup = () => {
        setGroups(prev => prev.map(g => g.id === activeGroupId ? {
            ...g,
            topics: g.topics.map(t => ({...t, completed: false})),
            adas: g.adas.map(a => ({...a, completed: false})),
            sessions: [],
            tasks: []
        } : g));
        setShowResetModal(false);
        showToast("¡Ciclo reseteado exitosamente! Catálogos intactos.");
      };

      const addSession = (type, contentId, dateStr) => {
        const newSession = { id: Date.now(), date: dateStr, type, contentId, notes: "", completed: false };
        setGroups(prev => prev.map(g => {
          if (g.id === activeGroupId) {
            const updatedSessions = [...(g.sessions || []), newSession].sort((a, b) => new Date(a.date) - new Date(b.date));
            return { ...g, sessions: updatedSessions };
          }
          return g;
        }));
        showToast(`Programado para el ${dateStr}`);
      };

      const confirmSchedule = () => {
        addSession(scheduleModal.itemType, scheduleModal.itemId, scheduleModal.date);
        setScheduleModal({ show: false, itemType: null, itemId: null, itemName: '', date: selectedDate });
      };

      const triggerSchedule = (type, id, name) => {
        setScheduleModal({ show: true, itemType: type, itemId: id, itemName: name, date: selectedDate });
      };

      const toggleSessionStatus = (groupId, sessionId) => {
        setGroups(prev => prev.map(g => g.id === groupId ? { ...g, sessions: g.sessions.map(s => s.id === sessionId ? { ...s, completed: !s.completed } : s) } : g));
      };

      const toggleStatus = (type, id, groupId = activeGroupId) => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, [type]: g[type].map(item => item.id === id ? { ...item, completed: !item.completed } : item) } : g));
      const deleteItem = (type, id) => setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, [type]: g[type].filter(item => item.id !== id) } : g));
      const updateSessionNotes = (sessionId, notes) => setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, sessions: g.sessions.map(s => s.id === sessionId ? { ...s, notes } : s) } : g));
      
      const addGroupTask = (text) => { if(text) setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, tasks: [...(g.tasks || []), { id: Date.now(), text, done: false }] } : g)); };
      const toggleGroupTask = (taskId, groupId = activeGroupId) => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, tasks: (g.tasks || []).map(t => t.id === taskId ? { ...t, done: !t.done } : t) } : g));
      const deleteGroupTask = (taskId, groupId = activeGroupId) => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, tasks: (g.tasks || []).filter(t => t.id !== taskId) } : g));
      
      const addNewGroup = (name, subject) => {
        if(!name || !subject) return;
        const newGroup = { id: 'G' + Date.now(), name, subject, color: ['#9B5DE5', '#BE95C4', '#E0B1CB', '#5E548E', '#9A8C98'][Math.floor(Math.random() * 5)], topics: [], adas: [], sessions: [], tasks: [] };
        setGroups([...groups, newGroup]);
        if(!activeGroupId) setActiveGroupId(newGroup.id);
        showToast("Nuevo grupo creado");
      };

      // Eliminar y Editar Grupos
      const deleteGroup = () => {
        if(!groupToDelete) return;
        setGroups(prev => prev.filter(g => g.id !== groupToDelete.id));
        if(activeGroupId === groupToDelete.id) {
          const remaining = groups.filter(g => g.id !== groupToDelete.id);
          setActiveGroupId(remaining.length > 0 ? remaining[0].id : null);
        }
        setGroupToDelete(null);
        showToast("Grupo eliminado de la base de datos");
      };

      const updateGroup = () => {
        if(!editingGroup || !editingGroup.name || !editingGroup.subject) return;
        setGroups(prev => prev.map(g => g.id === editingGroup.id ? { ...g, name: editingGroup.name, subject: editingGroup.subject } : g));
        setEditingGroup(null);
        showToast("Información del grupo actualizada");
      };

      // --- TRACKERS Y CALENDARIO ---
      const toggleMatrixHabit = (habitName, date) => {
        setPersonalData(prev => {
          const newMatrix = { ...prev.habitMatrix };
          if (!newMatrix[habitName]) newMatrix[habitName] = {};
          newMatrix[habitName][date] = !newMatrix[habitName][date];
          return { ...prev, habitMatrix: newMatrix };
        });
      };
      const deleteMatrixHabit = (habitName) => {
        setPersonalData(prev => {
          const newMatrix = { ...prev.habitMatrix };
          delete newMatrix[habitName];
          return { ...prev, habitMatrix: newMatrix };
        });
        showToast("Hábito eliminado");
      };
      const addNewMatrixHabit = (habitName) => {
        if(habitName) {
            setPersonalData(prev => ({ ...prev, habitMatrix: { ...prev.habitMatrix, [habitName]: {} } }));
            showToast("Hábito añadido a tu matriz");
        }
      };
      const setMood = (date, score) => { setPersonalData(prev => ({ ...prev, moodLogs: { ...prev.moodLogs, [date]: score } })); };

      const saveCalendarEvent = () => {
        if(showEventModal.date && showEventModal.text !== null) {
            setPersonalData(prev => ({
                ...prev,
                calendarEvents: {
                    ...prev.calendarEvents,
                    [showEventModal.date]: showEventModal.text
                }
            }));
        }
        setShowEventModal({ show: false, date: null, text: '' });
      };

      const weeklyInsights = useMemo(() => {
        const insights = [];
        if (personalData.habits.water < 5) insights.push({ type: 'warning', text: 'Toma agua mientras das clase.' });
        if (!personalData.habits.exercise) insights.push({ type: 'info', text: 'Un poco de movimiento ayuda al estrés.' });
        const sleepHour = personalData.sleep?.start ? parseInt(personalData.sleep.start.split(':')[0]) : 22;
        if (sleepHour < 22 && sleepHour > 5) insights.push({ type: 'success', text: 'Excelente horario de sueño.' });
        return insights.length > 0 ? insights : [{ type: 'info', text: '¡Mantén el ritmo!' }];
      }, [personalData]);

      // --- GENERACIÓN ARTE DE PORTADA (Fallback Unsplash si no hay API) ---
      const generateNewCover = () => {
        setIsGeneratingImg(true);
        // Al estar en web externa, usamos un arreglo de imágenes estéticas de alta calidad de Jacarandas y Flores.
        const fallbackImages = [
          "https://images.unsplash.com/photo-1522228115018-d838bcce5c3a?auto=format&fit=crop&w=1600&q=80",
          "https://images.unsplash.com/photo-1550684376-efcbd6e3f031?auto=format&fit=crop&w=1600&q=80",
          "https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=1600&q=80",
          "https://images.unsplash.com/photo-1518709766631-a6a7f45921c3?auto=format&fit=crop&w=1600&q=80",
          "https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=1600&q=80"
        ];
        
        setTimeout(() => {
           const randomImg = fallbackImages[Math.floor(Math.random() * fallbackImages.length)];
           setCoverImage(randomImg);
           localStorage.setItem('bitacora_cover_img', randomImg);
           setIsGeneratingImg(false);
        }, 800);
      };

      // --- COMPONENTES DE VISTA ---
      const WelcomeCover = () => (
        <div className="h-full w-full flex flex-col items-center justify-center p-12 relative overflow-hidden bg-[#FCF8FF]">
          {coverImage ? (
            <div className="absolute inset-0 z-0 transition-opacity duration-1000 opacity-60">
              <img src={coverImage} alt="Cover" className="w-full h-full object-cover" />
              <div className="absolute inset-0 bg-white/40 backdrop-blur-sm"></div>
            </div>
          ) : <div className="absolute inset-0 z-0 opacity-20 bg-gradient-to-br from-purple-100 to-pink-100" />}
          
          <div className="max-w-4xl w-full text-center z-10 animate-in fade-in zoom-in duration-1000">
            <div className="mb-10 inline-flex p-8 bg-white/90 backdrop-blur-md rounded-full shadow-2xl border border-white text-[#9B5DE5]">
              <Flower2 size={60} strokeWidth={1.5} />
            </div>
            <h1 className="text-7xl md:text-[9rem] font-serif font-bold text-[#5E548E] italic mb-10 tracking-tighter leading-none drop-shadow-md">Agenda - Bitácora</h1>
            <div className="mb-20 px-4 min-h-[100px]">
              <p className="text-3xl md:text-5xl font-serif italic text-[#5E548E] leading-tight max-w-4xl mx-auto drop-shadow-sm">
                "{personalData.quotes[personalData.activeQuoteIndex]}"
              </p>
            </div>
            <div className="flex flex-col items-center gap-6">
              <button onClick={() => setViewMode('daily')} className="group relative inline-flex items-center gap-6 bg-gradient-to-r from-[#9B5DE5] to-[#BE95C4] text-white px-16 py-7 rounded-full font-bold text-lg tracking-[0.3em] uppercase shadow-2xl hover:scale-105 active:scale-95 transition-all ring-offset-4 ring-8 ring-purple-50/50">
                <span>ENTRAR</span><ChevronRight size={24} className="group-hover:translate-x-2 transition-transform" />
              </button>
              <button onClick={generateNewCover} disabled={isGeneratingImg} className="flex items-center gap-2 text-[10px] font-bold text-[#5E548E] uppercase tracking-widest bg-white/60 p-3 px-6 rounded-full hover:bg-white transition-all shadow-sm">
                {isGeneratingImg ? <RefreshCw size={14} className="animate-spin" /> : <ImageIcon size={14} />}
                {isGeneratingImg ? "CARGANDO ARTE..." : "ROTAR FONDO FLORAL"}
              </button>
            </div>
          </div>
        </div>
      );

      const renderCalendarDays = () => {
         const year = currentCalMonth.getFullYear();
         const month = currentCalMonth.getMonth();
         const firstDay = new Date(year, month, 1).getDay(); // 0 = Dom, 1 = Lun
         const daysInMonth = new Date(year, month + 1, 0).getDate();
         
         const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1; // Hacer que Lunes sea 0
         
         const cells = [];
         for(let i=0; i<adjustedFirstDay; i++) cells.push(<div key={`empty-${i}`} className="p-2 opacity-0"></div>);
         
         for(let day=1; day<=daysInMonth; day++) {
             const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
             const eventText = personalData.calendarEvents?.[dateStr];
             const isToday = dateStr === selectedDate;
             
             cells.push(
                 <div key={day} onClick={() => setShowEventModal({show:true, date:dateStr, text: eventText || ''})} className={`min-h-[100px] p-3 border border-purple-50 rounded-3xl transition-all cursor-pointer hover:shadow-md flex flex-col ${isToday ? 'bg-[#F7EFFF] border-[#9B5DE5]' : 'bg-white'}`}>
                    <span className={`text-sm font-bold ${isToday ? 'text-[#9B5DE5]' : 'text-slate-400'}`}>{day}</span>
                    {eventText && (
                        <div className="mt-2 text-[10px] bg-purple-100 text-purple-700 p-2 rounded-xl leading-tight italic overflow-hidden line-clamp-3">
                           {eventText}
                        </div>
                    )}
                 </div>
             );
         }
         return cells;
      };

      return (
        <div className="flex h-screen w-full bg-[#FCF8FF] font-sans text-slate-700 overflow-hidden print:bg-white relative">
          
          {/* SISTEMA DE TOAST */}
          {toastMsg && (
             <div className="fixed top-6 right-6 z-[100] bg-[#9B5DE5] text-white px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 animate-in fade-in slide-in-from-top-4">
                <CheckCircle2 size={18} />
                <span className="text-xs font-bold tracking-widest uppercase">{toastMsg}</span>
             </div>
          )}

          {viewMode !== 'welcome' && (
            <aside className={`w-20 md:w-72 bg-white border-r border-purple-50 flex flex-col transition-all print:hidden ${isPrivateMode ? 'filter blur-sm pointer-events-none opacity-50' : ''}`}>
              <div className="p-10 border-b border-purple-50 flex items-center justify-between">
                <button onClick={() => setViewMode('welcome')} className="text-2xl font-serif font-bold text-[#9B5DE5] hidden md:block italic hover:opacity-70">Agenda - Bitácora</button>
                <Flower2 size={24} className="text-[#9B5DE5] md:hidden" />
              </div>
              <div className="flex-1 overflow-y-auto p-6 space-y-3 custom-scrollbar">
                <button onClick={() => setViewMode('daily')} className={`w-full flex items-center p-4 rounded-3xl transition-all ${viewMode === 'daily' ? 'bg-[#9B5DE5] text-white shadow-lg' : 'hover:bg-purple-50 text-slate-500'}`}>
                  <Calendar size={20} /> <span className="ml-4 font-bold text-xs hidden md:block uppercase tracking-widest">Hoy</span>
                </button>
                <button onClick={() => setViewMode('calendar')} className={`w-full flex items-center p-4 rounded-3xl transition-all ${viewMode === 'calendar' ? 'bg-[#E0B1CB] text-white shadow-lg' : 'hover:bg-purple-50 text-slate-500'}`}>
                  <CalendarDays size={20} /> <span className="ml-4 font-bold text-xs hidden md:block uppercase tracking-widest">Calendario</span>
                </button>
                <button onClick={() => setViewMode('personal')} className={`w-full flex items-center p-4 rounded-3xl transition-all ${viewMode === 'personal' ? 'bg-[#BE95C4] text-white shadow-lg' : 'hover:bg-purple-50 text-slate-500'}`}>
                  <User size={20} /> <span className="ml-4 font-bold text-xs hidden md:block uppercase tracking-widest">Personal</span>
                </button>
                <button onClick={() => setViewMode('settings')} className={`w-full flex items-center p-4 rounded-3xl transition-all ${viewMode === 'settings' ? 'bg-[#5E548E] text-white shadow-lg' : 'hover:bg-purple-50 text-slate-400'}`}>
                  <Settings size={20} /> <span className="ml-4 font-bold text-xs hidden md:block uppercase tracking-widest">Config</span>
                </button>
                <div className="pt-8 border-t border-purple-50 mt-6">
                  <p className="text-[10px] font-bold text-purple-300 px-4 mb-4 uppercase tracking-widest">Mis Grupos</p>
                  {groups.map(group => (
                    <button key={group.id} onClick={() => { setViewMode('groups'); setActiveGroupId(group.id); }} className={`w-full flex items-center p-3 rounded-[1.5rem] mb-2 transition-all ${viewMode === 'groups' && activeGroupId === group.id ? 'bg-[#F7EFFF]' : 'hover:bg-purple-50'}`}>

      {showResetModal && (
        <div className="fixed inset-0 z-[70] bg-red-900/40 backdrop-blur-md flex items-center justify-center p-6 animate-in fade-in">
           <div className="bg-white w-full max-w-md p-10 rounded-[3rem] shadow-2xl text-center">
              <AlertCircle size={60} className="text-red-400 mx-auto mb-6" />
              <h3 className="text-3xl font-serif font-bold text-slate-800 italic mb-4">¿Fin del Ciclo?</h3>
              <p className="text-sm text-slate-500 mb-8 leading-relaxed">Estás a punto de resetear <strong>{activeGroup.name}</strong>. Se borrará tu bitácora, las palomitas de los temas y las calificaciones. Tus catálogos de Temas y ADAs se conservarán para el siguiente semestre.</p>
              <div className="flex gap-4 mt-6">
                <button onClick={() => setShowResetModal(false)} className="flex-1 p-5 rounded-2xl font-bold text-[11px] text-slate-500 bg-slate-100 hover:bg-slate-200 uppercase tracking-widest transition-colors">Cancelar</button>
                <button onClick={handleResetGroup} className="flex-1 p-5 rounded-2xl font-bold text-[11px] bg-red-400 text-white shadow-lg hover:bg-red-500 uppercase tracking-widest transition-colors">Sí, limpiar grupo</button>
              </div>
           </div>
        </div>
      )}

      {/* MODAL IMPORTACIÓN */}
      {showImportModal && (
        <div className="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-xl flex items-center justify-center p-8 animate-in fade-in">
          <div className="bg-white w-full max-w-2xl rounded-[5rem] shadow-2xl overflow-hidden border border-white">
            <div className="p-14 bg-[#F7EFFF] border-b border-purple-100 text-center relative overflow-hidden">
              <Flower2 size={150} className="absolute -top-12 -right-12 opacity-10" />
              <div className={`w-28 h-28 rounded-[3rem] mx-auto mb-8 flex items-center justify-center text-white shadow-2xl transform -rotate-12 ${importType === 'topics' ? 'bg-[#9B5DE5]' : 'bg-[#BE95C4]'}`}>
                {importType === 'topics' ? <ListChecks size={56}/> : <ClipboardList size={56}/>}
              </div>
              <h3 className="text-5xl font-serif font-bold text-[#5E548E] uppercase tracking-tighter italic">Carga de {importType === 'topics' ? 'Temas' : 'ADAs'}</h3>
              <p className="text-[14px] text-[#9B5DE5] font-bold italic mt-4 uppercase tracking-[0.3em]">Copia y pega tu Excel aquí</p>
            </div>
            <div className="p-14">
              <textarea className="w-full h-80 p-10 bg-slate-50 rounded-[4rem] border border-slate-100 focus:outline-none focus:border-[#9B5DE5] text-lg custom-scrollbar font-light leading-relaxed italic shadow-inner" placeholder={importType === 'topics' ? "Urbanismo\nMorfología\nSostenibilidad..." : "ADA 1\nADA 2..."} value={importText} onChange={(e) => setImportText(e.target.value)} />
              <div className="flex gap-8 mt-14">
                <button onClick={() => setShowImportModal(false)} className="flex-1 p-8 rounded-full font-bold text-[12px] text-slate-300 hover:bg-slate-50 transition-all uppercase tracking-[0.4em]">Cerrar</button>
                <button onClick={handleImport} className="flex-1 p-8 rounded-full font-bold text-[12px] bg-gradient-to-r from-[#9B5DE5] to-[#BE95C4] text-white shadow-2xl hover:scale-105 active:scale-95 transition-all uppercase tracking-[0.4em]">Importar Datos</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <style dangerouslySetInnerHTML={{ __html: `
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:italic,wght@0,400;1,400&family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FCF8FF; }
        .font-serif { font-family: 'Instrument Serif', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #EBD9FC; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #BE95C4; }
        @media print { .print\\:hidden { display: none !important; } body { background: white !important; } main { overflow: visible !important; } }
      `}} />
    </div>
  );
};

const root = createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
