<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FCF8FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bitácora">
  
  <title>Agenda - Bitácora</title>

  <!-- ICONOS PARA LA APP (Jacaranda Style) -->
  <!-- Estos íconos son los que leerá tu Samsung o tu compu al instalarla -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%239B5DE5%22/><path d=%22M50 20 C60 40 85 45 85 70 C85 95 60 100 50 80 C40 100 15 95 15 70 C15 45 40 40 50 20 Z%22 fill=%22white%22/></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%239B5DE5%22/><path d=%22M50 20 C60 40 85 45 85 70 C85 95 60 100 50 80 C40 100 15 95 15 70 C15 45 40 40 50 20 Z%22 fill=%22white%22/></svg>">
  
  <!-- MANIFEST: Le dice a tu tableta "Oye, soy una app instalable" -->
  <link rel="manifest" href='data:application/manifest+json,{
    "name": "Agenda Bitácora Docente",
    "short_name": "Bitácora",
    "start_url": ".",
    "display": "standalone",
    "background_color": "#FCF8FF",
    "theme_color": "#9B5DE5",
    "icons": [{
      "src": "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%239B5DE5%22/><path d=%22M50 20 C60 40 85 45 85 70 C85 95 60 100 50 80 C40 100 15 95 15 70 C15 45 40 40 50 20 Z%22 fill=%22white%22/></svg>",
      "sizes": "192x192",
      "type": "image/svg+xml"
    }]
  }' />

  <!-- Import Map para evitar el error #31 (React Duplicado) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?external=react"
      }
    }
  </script>
  
  <!-- Tailwind CSS para los estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fuentes Elegantes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:italic,wght@0,400;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Configuración de Colores y Fuentes -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Instrument Serif', 'serif'],
          },
        }
      }
    }
  </script>
  
  <!-- Estilos Personalizados y Animaciones -->
  <style>
    body { background-color: #FCF8FF; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #EBD9FC; border-radius: 20px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #BE95C4; }
    
    @keyframes petal-fall {
      0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
      20% { opacity: 0.6; transform: translateY(20vh) rotate(90deg) translateX(30px); }
      50% { transform: translateY(50vh) rotate(180deg) translateX(-30px); }
      100% { transform: translateY(110vh) rotate(360deg) translateX(15px); opacity: 0; }
    }
    .animate-petal-fall { animation: petal-fall 14s linear infinite; }
    
    @media print {
      .print\:hidden { display: none !important; }
      body { background: white !important; }
      main { overflow: visible !important; }
    }
  </style>

  <!-- React & Babel Standalone para funcionar sin servidores -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- Aquí es donde nace la App -->
  <div id="root"></div>

  <!-- Código Principal en React -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      CheckCircle2, Circle, BookOpen, Calendar, ChevronRight, Edit3, Printer, PlusCircle, Layout, Clock, ArrowLeft, ArrowRight, User, Eye, EyeOff, Droplet, Moon, Dumbbell, Quote, GraduationCap, Download, Trash2, Lock, Settings, Plus, Check, ListChecks, ClipboardList, History, Sparkles, Flower2, Upload, RefreshCw, Image as ImageIcon, Smile, Meh, Frown, Monitor, TrendingUp 
    } from 'lucide-react';

    const App = () => {
      const apiKey = ""; // API Key (Vercel lo ignora al ser web estática)

      // --- ESTADOS PRINCIPALES ---
      const [viewMode, setViewMode] = useState('welcome'); 
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [isPrivateMode, setIsPrivateMode] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [importType, setImportType] = useState('topics'); 
      const [importText, setImportText] = useState("");
      const [coverImage, setCoverImage] = useState(localStorage.getItem('bitacora_cover_img') || null);
      const [isGeneratingImg, setIsGeneratingImg] = useState(false);

      // --- LÓGICA DE PERSISTENCIA ---
      const [groups, setGroups] = useState(() => {
        const saved = localStorage.getItem('bitacora_grupos_v9') || 
                      localStorage.getItem('bitacora_grupos_v8') || 
                      localStorage.getItem('bitacora_grupos_v7') || 
                      localStorage.getItem('bitacora_grupos_v6') ||
                      localStorage.getItem('bitacora_grupos_v5');
        
        const exampleGroups = [
          { 
            id: 'G1', 
            name: 'Grupo 101', 
            subject: 'Diseño Urbano I', 
            color: '#BE95C4', 
            topics: [
              { id: 1, title: 'Introducción al Urbanismo Sistémico', completed: true },
              { id: 2, title: 'Análisis de Morfología Urbana', completed: false },
              { id: 3, title: 'Teoría de las Redes y Espacio Público', completed: false },
              { id: 4, title: 'Sostenibilidad y Resiliencia en la Ciudad', completed: false }
            ],
            adas: [
              { id: 101, title: 'ADA 1: Mapa Conceptual de la Ciudad Histórica', completed: true },
              { id: 102, title: 'ADA 2: Reporte Fotográfico de Campo', completed: false },
              { id: 103, title: 'Examen de Medio Término', completed: false }
            ],
            sessions: [
              { 
                id: 501, date: '2024-05-20', type: 'tema', contentId: 1, 
                notes: 'La sesión fue muy participativa. Los alumnos mostraron especial interés en el concepto de "metabolismo urbano". Quedó pendiente profundizar en la normativa local para la siguiente sesión.' 
              }
            ],
            tasks: [
              { id: 1001, text: 'Revisar avances del equipo de Mariana', done: false }
            ]
          }
        ];

        return saved ? JSON.parse(saved) : exampleGroups;
      });

      const [personalData, setPersonalData] = useState(() => {
        const saved = localStorage.getItem('bitacora_personal_v9') || 
                      localStorage.getItem('bitacora_personal_v8') || 
                      localStorage.getItem('bitacora_personal_v7') ||
                      localStorage.getItem('bitacora_personal_v6');
        
        const baseData = {
          habits: { water: 0, exercise: false },
          sleep: { start: '22:00', end: '06:00' },
          screenTime: 4,
          tasks: [],
          quotes: [
            "La arquitectura es música congelada.", 
            "Menos es más.",
            "La ciudad debe ser una colección de momentos hermosos."
          ],
          activeQuoteIndex: 0,
          habitMatrix: { 'Vitaminas': {}, 'Lectura': {}, 'No Gastar': {}, 'Skin Care': {} },
          moodLogs: {} 
        };

        if (saved) {
          const parsed = JSON.parse(saved);
          return { ...baseData, ...parsed };
        }
        return baseData;
      });

      const [activeGroupId, setActiveGroupId] = useState(groups[0]?.id);

      useEffect(() => { localStorage.setItem('bitacora_grupos_v9', JSON.stringify(groups)); }, [groups]);
      useEffect(() => { localStorage.setItem('bitacora_personal_v9', JSON.stringify(personalData)); }, [personalData]);

      // --- DERIVADOS ---
      const activeGroup = useMemo(() => groups.find(g => g.id === activeGroupId), [groups, activeGroupId]);
      const dailySessionsCount = useMemo(() => groups.reduce((acc, g) => acc + (g.sessions?.filter(s => s.date === selectedDate).length || 0), 0), [groups, selectedDate]);
      const calculateGrading = (group) => {
        if (!group?.adas || group.adas.length === 0) return 0;
        const completed = group.adas.filter(a => a.completed).length;
        return Math.round((completed / group.adas.length) * 100);
      };

      const getWeekDays = (dateString) => {
        const dt = new Date(dateString + 'T12:00:00');
        const day = dt.getDay();
        const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(dt.setDate(diff));
        const week = [];
        for(let i=0; i<7; i++) {
           const nextDay = new Date(monday);
           nextDay.setDate(monday.getDate() + i);
           week.push(nextDay.toISOString().split('T')[0]);
        }
        return week;
      };
      
      const weekDays = getWeekDays(selectedDate);
      const hasActivity = (dStr) => groups.some(g => g.sessions?.some(s => s.date === dStr));

      // --- TRACKERS ---
      const toggleMatrixHabit = (habitName, date) => {
        setPersonalData(prev => {
          const newMatrix = { ...prev.habitMatrix };
          if (!newMatrix[habitName]) newMatrix[habitName] = {};
          newMatrix[habitName][date] = !newMatrix[habitName][date];
          return { ...prev, habitMatrix: newMatrix };
        });
      };
      const setMood = (date, score) => { setPersonalData(prev => ({ ...prev, moodLogs: { ...prev.moodLogs, [date]: score } })); };

      // --- ACCIONES ---
      const handleImport = () => {
        const lines = importText.split('\n').filter(l => l.trim() !== "");
        const newItems = lines.map((line, index) => ({ id: Date.now() + index, title: line.trim(), completed: false }));
        setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, [importType]: [...g[importType], ...newItems] } : g));
        setImportText(""); setShowImportModal(false);
      };
      const addSession = (type, contentId) => {
        const newSession = { id: Date.now(), date: selectedDate, type, contentId, notes: "" };
        setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, sessions: [newSession, ...(g.sessions || [])] } : g));
      };
      const updateSessionNotes = (sessionId, notes) => setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, sessions: g.sessions.map(s => s.id === sessionId ? { ...s, notes } : s) } : g));
      const deleteItem = (type, id) => setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, [type]: g[type].filter(item => item.id !== id) } : g));
      const toggleStatus = (type, id, groupId = activeGroupId) => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, [type]: g[type].map(item => item.id === id ? { ...item, completed: !item.completed } : item) } : g));
      const addGroupTask = (text) => {
        if(!text) return;
        setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, tasks: [...(g.tasks || []), { id: Date.now(), text, done: false }] } : g));
      };
      const toggleGroupTask = (taskId) => setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, tasks: (g.tasks || []).map(t => t.id === taskId ? { ...t, done: !t.done } : t) } : g));
      const deleteGroupTask = (taskId) => setGroups(prev => prev.map(g => g.id === activeGroupId ? { ...g, tasks: (g.tasks || []).filter(t => t.id !== taskId) } : g));
      const addNewGroup = (name, subject) => {
        if(!name || !subject) return;
        const newGroup = { id: 'G' + Date.now(), name, subject, color: ['#9B5DE5', '#BE95C4', '#E0B1CB', '#5E548E', '#9A8C98'][Math.floor(Math.random() * 5)], topics: [], adas: [], sessions: [], tasks: [] };
        setGroups([...groups, newGroup]);
      };
      const addNewMatrixHabit = (habitName) => {
        if(!habitName) return;
        setPersonalData(prev => ({ ...prev, habitMatrix: { ...prev.habitMatrix, [habitName]: {} } }));
      };

      const weeklyInsights = useMemo(() => {
        const insights = [];
        if (personalData.habits.water < 5) insights.push({ type: 'warning', text: 'Esta semana has tomado poca agua. ¡No olvides tu botella!' });
        if (!personalData.habits.exercise) insights.push({ type: 'info', text: 'Un poco de movimiento te vendría bien para el estrés.' });
        const sleepHour = personalData.sleep?.start ? parseInt(personalData.sleep.start.split(':')[0]) : 22;
        if (sleepHour < 22 && sleepHour > 5) insights.push({ type: 'success', text: 'Tu horario de sueño está siendo muy saludable.' });
        return insights.length > 0 ? insights : [{ type: 'info', text: '¡Vas por buen camino, mantén el ritmo!' }];
      }, [personalData]);

      const generateNewCover = async () => {
        setIsGeneratingImg(true);
        const prompt = "A minimalist, aesthetic, artistic background for a digital planner. Soft watercolor style. Branches of purple Jacaranda flowers and soft pink cherry blossoms framing the edges. Pastel palette: lavender, soft mauve, orchid, and cool light gray. High quality, elegant vibe.";
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1 } })
          });
          const result = await response.json();
          if (result.predictions && result.predictions[0]) {
            const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            setCoverImage(imageUrl); localStorage.setItem('bitacora_cover_img', imageUrl);
          }
        } catch (error) { console.error(error); } finally { setIsGeneratingImg(false); }
      };

      const WelcomeCover = () => (
        <div className="h-full w-full flex flex-col items-center justify-center p-12 relative overflow-hidden bg-[#FCF8FF]">
          {coverImage ? (
            <div className="absolute inset-0 z-0 transition-opacity duration-1000 opacity-40">
              <img src={coverImage} alt="Cover" className="w-full h-full object-cover" />
            </div>
          ) : <div className="absolute inset-0 z-0 opacity-20 bg-gradient-to-br from-purple-100 to-pink-100" />}
          
          <div className="max-w-4xl w-full text-center z-10 animate-in fade-in zoom-in duration-1000">
            <div className="mb-10 inline-flex p-8 bg-white/80 backdrop-blur-md rounded-full shadow-2xl border border-white text-[#9B5DE5]">
              <Flower2 size={60} strokeWidth={1} />
            </div>
            <p className="text-[12px] font-bold text-[#5E548E] uppercase tracking-[0.9em] mb-8 opacity-70">Mérida • Planeación • Gestión</p>
            <h1 className="text-7xl md:text-[9rem] font-serif font-bold text-[#5E548E] italic mb-10 tracking-tighter leading-none drop-shadow-sm">Agenda - Bitácora</h1>
            <div className="mb-20 px-4 min-h-[100px]">
              <p className="text-3xl md:text-5xl font-serif italic text-[#9B5DE5] leading-tight max-w-4xl mx-auto opacity-90">
                "{personalData.quotes[personalData.activeQuoteIndex]}"
              </p>
            </div>
            <div className="flex flex-col items-center gap-6">
              <button onClick={() => setViewMode('daily')} className="group relative inline-flex items-center gap-6 bg-gradient-to-r from-[#9B5DE5] to-[#BE95C4] text-white px-16 py-7 rounded-full font-bold text-lg tracking-[0.3em] uppercase shadow-2xl hover:scale-105 active:scale-95 transition-all ring-offset-4 ring-8 ring-purple-50/50">
                <span>ENTRAR</span><ChevronRight size={24} className="group-hover:translate-x-2 transition-transform" />
              </button>
              <button onClick={generateNewCover} disabled={isGeneratingImg} className="flex items-center gap-2 text-[10px] font-bold text-[#5E548E] uppercase tracking-widest opacity-40 hover:opacity-100 transition-opacity">
                {isGeneratingImg ? <RefreshCw size={14} className="animate-spin" /> : <ImageIcon size={14} />}
                {isGeneratingImg ? "GENERANDO ARTE..." : "ACTUALIZAR FONDO ARTÍSTICO"}
              </button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex h-screen w-full bg-[#FCF8FF] font-sans text-slate-700 overflow-hidden print:bg-white">
          {viewMode !== 'welcome' && (
            <aside className={`w-20 md:w-72 bg-white border-r border-purple-50 flex flex-col transition-all print:hidden ${isPrivateMode ? 'filter blur-sm pointer-events-none opacity-50' : ''}`}>
              <div className="p-10 border-b border-purple-50 flex items-center justify-between">
                <button onClick={() => setViewMode('welcome')} className="text-2xl font-serif font-bold text-[#9B5DE5] hidden md:block italic hover:opacity-70">Agenda - Bitácora</button>
                <Flower2 size={24} className="text-[#9B5DE5] md:hidden" />
              </div>
              <div className="flex-1 overflow-y-auto p-6 space-y-3 custom-scrollbar">
                <button onClick={() => setViewMode('daily')} className={`w-full flex items-center p-4 rounded-3xl transition-all ${viewMode === 'daily' ? 'bg-[#9B5DE5] text-white shadow-lg' : 'hover:bg-purple-50 text-slate-500'}`}>
                  <Calendar size={20} /> <span className="ml-4 font-bold text-xs hidden md:block uppercase tracking-widest">Hoy</span>
                </button>
                <button onClick={() => setViewMode('personal')} className={`w-full flex items-center p-4 rounded-3xl transition-all ${viewMode === 'personal' ? 'bg-[#BE95C4] text-white shadow-lg' : 'hover:bg-purple-50 text-slate-500'}`}>
                  <User size={20} /> <span className="ml-4 font-bold text-xs hidden md:block uppercase tracking-widest">Personal</span>
                </button>
                <button onClick={() => setViewMode('settings')} className={`w-full flex items-center p-4 rounded-3xl transition-all ${viewMode === 'settings' ? 'bg-[#5E548E] text-white shadow-lg' : 'hover:bg-purple-50 text-slate-400'}`}>
                  <Settings size={20} /> <span className="ml-4 font-bold text-xs hidden md:block uppercase tracking-widest">Config</span>
                </button>
                <div className="pt-8 border-t border-purple-50 mt-6">
                  <p className="text-[10px] font-bold text-purple-300 px-4 mb-4 uppercase tracking-widest">Mis Grupos</p>
                  {groups.map(group => (
                    <button key={group.id} onClick={() => { setViewMode('groups'); setActiveGroupId(group.id); }} className={`w-full flex items-center p-3 rounded-[1.5rem] mb-2 transition-all ${viewMode === 'groups' && activeGroupId === group.id ? 'bg-[#F7EFFF]' : 'hover:bg-purple-50'}`}>
                      <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-[10px] font-bold shrink-0 shadow-sm" style={{ backgroundColor: group.color }}>{group.name.match(/\d+/)?.[0] || "?"}</div>
                      <div className="ml-4 text-left hidden md:block overflow-hidden">
                        <p className="font-semibold text-xs truncate">{group.name}</p>
                        <div className="h-1 w-14 bg-slate-100 rounded-full overflow-hidden mt-1"><div className="h-full bg-[#B5838D]" style={{ width: `${calculateGrading(group)}%` }} /></div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </aside>
          )}

          {viewMode !== 'welcome' && (
            <button onClick={() => setIsPrivateMode(!isPrivateMode)} className="fixed bottom-10 right-10 z-50 p-6 rounded-full bg-white shadow-2xl border border-pink-50 text-[#B5838D] hover:scale-110 active:scale-95 transition-all print:hidden">
              {isPrivateMode ? <Eye size={28} /> : <EyeOff size={28} />}
            </button>
          )}

          <main className="flex-1 flex flex-col overflow-hidden relative">
            {isPrivateMode && viewMode !== 'welcome' && (
              <div className="absolute inset-0 z-40 bg-white/95 backdrop-blur-2xl flex flex-col items-center justify-center text-[#9B5DE5]">
                <Lock size={100} className="mb-8 opacity-10" />
                <h2 className="text-4xl font-serif font-bold italic tracking-widest uppercase">Modo Privado</h2>
              </div>
            )}

            {viewMode === 'welcome' && <WelcomeCover />}

            {viewMode === 'groups' && (
               <div className="flex-1 flex flex-col overflow-hidden">
                 <header className="bg-white p-8 border-b border-slate-50 flex justify-between items-center">
                  <div>
                    <h2 className="text-4xl font-serif font-bold text-[#5E548E] italic tracking-tight leading-tight">{activeGroup?.subject}</h2>
                    <div className="flex items-center gap-6 mt-2">
                      <span className="px-4 py-1 bg-[#F7EFFF] text-[#9B5DE5] rounded-full text-[11px] font-bold uppercase tracking-widest shadow-sm">{activeGroup?.name}</span>
                      <span className="text-[11px] font-bold uppercase tracking-widest text-slate-400 flex items-center gap-2"><GraduationCap size={16}/> Avance ADAs: {calculateGrading(activeGroup)}%</span>
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <button onClick={() => { setImportType('topics'); setShowImportModal(true); }} className="p-3 px-6 bg-purple-50 text-[#9B5DE5] rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white transition-all shadow-sm">Temas +</button>
                    <button onClick={() => { setImportType('adas'); setShowImportModal(true); }} className="p-3 px-6 bg-indigo-50 text-[#5E548E] rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white transition-all shadow-sm">ADAs +</button>
                    <button onClick={() => window.print()} className="p-3 bg-white border border-slate-100 rounded-2xl text-slate-400 hover:text-purple-500 transition-colors"><Printer size={20} /></button>
                  </div>
                </header>
                <div className="flex-1 flex p-8 gap-8 overflow-hidden bg-[#FCF8FF]">
                   <section className="w-[30%] flex flex-col gap-8 overflow-hidden">
                      <div className="bg-white rounded-[2.5rem] border border-purple-50 shadow-sm flex flex-col h-1/2 overflow-hidden">
                        <div className="p-5 bg-[#F7EFFF] border-b border-purple-50 font-bold text-[10px] uppercase text-slate-500 flex items-center gap-2"><ListChecks size={14}/> Catálogo de Temas</div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
                          {activeGroup?.topics.map(t => (
                            <div key={t.id} className="group flex items-center p-3 bg-slate-50/50 rounded-xl relative border border-transparent hover:border-purple-200 transition-all">
                              <button onClick={() => toggleStatus('topics', t.id)} className={`mr-3 transition-colors ${t.completed ? 'text-[#9B5DE5]' : 'text-slate-300 hover:text-purple-400'}`}>
                                {t.completed ? <CheckCircle2 size={20}/> : <Circle size={20}/>}
                              </button>
                              <div className="flex-1"><p className={`text-xs font-semibold transition-all ${t.completed ? 'text-slate-400 italic line-through' : 'text-slate-700'}`}>{t.title}</p></div>
                              <button onClick={() => addSession('tema', t.id)} title="Añadir a registro" className="absolute right-10 opacity-0 group-hover:opacity-100 text-indigo-300 hover:text-indigo-600 transition-all"><PlusCircle size={16}/></button>

                        try {
                          const data = JSON.parse(re.target.result);
                          if (data.groups && data.personalData) { setGroups(data.groups); setPersonalData(data.personalData); alert("¡Agenda restaurada!"); }
                        } catch (err) { alert("Archivo no válido."); }
                      };
                      reader.readAsText(file);
                    }} className="hidden" />
                  </label>
                </div>
              </section>
              
              <section className="flex flex-col gap-8">
                <div className="bg-white p-10 rounded-[4rem] border border-purple-50 shadow-xl">
                  <h3 className="font-bold text-[12px] uppercase tracking-[0.5em] text-[#9B5DE5] mb-6 flex items-center gap-4 italic"><Quote size={20}/> Frases Diarias</h3>
                  <div className="flex gap-4">
                    <input type="text" id="newQuote" placeholder="Nueva frase inspiradora..." className="flex-1 p-4 bg-slate-50 rounded-2xl text-sm focus:outline-none border border-transparent focus:border-purple-200 italic shadow-inner" />
                    <button onClick={() => {
                      const inp = document.getElementById('newQuote');
                      if(inp.value) setPersonalData(p => ({...p, quotes: [...p.quotes, inp.value]}));
                      inp.value = '';
                    }} className="p-4 bg-[#9B5DE5] text-white rounded-2xl font-bold shadow-md hover:scale-105"><Plus size={24}/></button>
                  </div>
                </div>

                <div className="bg-white p-10 rounded-[4rem] border border-purple-50 shadow-xl">
                  <h3 className="font-bold text-[12px] uppercase tracking-[0.5em] text-[#BE95C4] mb-6 flex items-center gap-4 italic"><ListChecks size={20}/> Nuevos Trackers</h3>
                  <p className="text-xs text-slate-400 mb-4">Añade un hábito a tu matriz semanal en Personal (Ej. Meditar, Skin Care):</p>
                  <div className="flex gap-4">
                    <input type="text" id="newHabit" placeholder="Nuevo hábito..." className="flex-1 p-4 bg-slate-50 rounded-2xl text-sm focus:outline-none border border-transparent focus:border-purple-200 italic shadow-inner" />
                    <button onClick={() => {
                      const inp = document.getElementById('newHabit');
                      addNewMatrixHabit(inp.value);
                      inp.value = '';
                      alert("Hábito añadido. Búscalo en tu sección Personal.");
                    }} className="p-4 bg-[#BE95C4] text-white rounded-2xl font-bold shadow-md hover:scale-105"><Plus size={24}/></button>
                  </div>
                </div>

                <div className="bg-white p-10 rounded-[4rem] border border-purple-50 shadow-xl">
                  <h3 className="font-bold text-[12px] uppercase tracking-[0.5em] text-[#5E548E] mb-6 flex items-center gap-4 italic"><Layout size={20}/> Nuevos Grupos</h3>
                  <p className="text-xs text-slate-400 mb-4">Crea la base de un grupo vacío para luego importarle temas:</p>
                  <div className="flex flex-col gap-3">
                    <input type="text" id="newGroupName" placeholder="Ej. Grupo 305" className="w-full p-4 bg-slate-50 rounded-2xl text-sm focus:outline-none shadow-inner" />
                    <input type="text" id="newGroupSubj" placeholder="Ej. Algoritmos Urbanos" className="w-full p-4 bg-slate-50 rounded-2xl text-sm focus:outline-none shadow-inner" />
                    <button onClick={() => {
                      const n = document.getElementById('newGroupName');
                      const s = document.getElementById('newGroupSubj');
                      addNewGroup(n.value, s.value);
                      n.value = ''; s.value = '';
                      alert("Grupo creado. Ve al menú lateral para cargarle Temas o ADAs.");
                    }} className="w-full p-4 mt-2 bg-[#5E548E] text-white rounded-2xl font-bold text-[11px] tracking-widest uppercase shadow-md hover:scale-105">Crear Nuevo Grupo</button>
                  </div>
                </div>
              </section>
            </div>
          </div>
        )}
      </main>

      {/* MODAL IMPORTACIÓN */}
      {showImportModal && (
        <div className="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-xl flex items-center justify-center p-8">
          <div className="bg-white w-full max-w-2xl rounded-[5rem] shadow-2xl overflow-hidden border border-white animate-in zoom-in duration-300">
            <div className="p-14 bg-[#F7EFFF] border-b border-purple-100 text-center relative overflow-hidden">
              <Flower2 size={150} className="absolute -top-12 -right-12 opacity-10" />
              <div className={`w-28 h-28 rounded-[3rem] mx-auto mb-8 flex items-center justify-center text-white shadow-2xl transform -rotate-12 ${importType === 'topics' ? 'bg-[#9B5DE5]' : 'bg-[#BE95C4]'}`}>
                {importType === 'topics' ? <ListChecks size={56}/> : <ClipboardList size={56}/>}
              </div>
              <h3 className="text-5xl font-serif font-bold text-[#5E548E] uppercase tracking-tighter italic">Carga de {importType === 'topics' ? 'Temas' : 'ADAs'}</h3>
              <p className="text-[14px] text-[#9B5DE5] font-bold italic mt-4 uppercase tracking-[0.3em]">Copia y pega tu Excel aquí</p>
            </div>
            <div className="p-14">
              <textarea className="w-full h-80 p-10 bg-slate-50 rounded-[4rem] border border-slate-100 focus:outline-none focus:border-[#9B5DE5] text-lg custom-scrollbar font-light leading-relaxed italic shadow-inner" placeholder={importType === 'topics' ? "Urbanismo\nMorfología\nSostenibilidad..." : "ADA 1\nADA 2..."} value={importText} onChange={(e) => setImportText(e.target.value)} />
              <div className="flex gap-8 mt-14">
                <button onClick={() => setShowImportModal(false)} className="flex-1 p-8 rounded-full font-bold text-[12px] text-slate-300 hover:bg-slate-50 transition-all uppercase tracking-[0.4em]">Cerrar</button>
                <button onClick={handleImport} className="flex-1 p-8 rounded-full font-bold text-[12px] bg-gradient-to-r from-[#9B5DE5] to-[#BE95C4] text-white shadow-2xl hover:scale-105 active:scale-95 transition-all uppercase tracking-[0.4em]">Importar Datos</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <style dangerouslySetInnerHTML={{ __html: `
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:italic,wght@0,400;1,400&family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FCF8FF; }
        .font-serif { font-family: 'Instrument Serif', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #EBD9FC; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #BE95C4; }
        
        @keyframes petal-fall {
          0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
          20% { opacity: 0.6; transform: translateY(20vh) rotate(90deg) translateX(30px); }
          50% { transform: translateY(50vh) rotate(180deg) translateX(-30px); }
          100% { transform: translateY(110vh) rotate(360deg) translateX(15px); opacity: 0; }
        }
        .animate-petal-fall { animation: petal-fall 14s linear infinite; }

        @media print {
          .print\\:hidden { display: none !important; }
          body { background: white !important; }
          main { overflow: visible !important; }
        }
      `}} />
    </div>
  );
};

const root = createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
