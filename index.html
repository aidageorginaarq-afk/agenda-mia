<!DOCTYPE html>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          colors: {
            theme: { main: 'var(--theme-main)', sec: 'var(--theme-sec)', dark: 'var(--theme-dark)', bg: 'var(--theme-bg)', surface: 'var(--theme-surface)', accent: 'var(--theme-accent)' }
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Instrument Serif', 'serif'] } 
        } 
      } 
    }
  </script>
  
  <style>
    body { background-color: var(--theme-bg); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; transition: background-color 0.5s ease; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--theme-surface); border-radius: 20px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--theme-sec); }
    @media print { .print\:hidden { display: none !important; } body { background: white !important; } main { overflow: visible !important; } }

</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      CheckCircle2, Circle, BookOpen, Calendar, ChevronRight, Edit3, Printer, PlusCircle, Layout, Clock, ArrowLeft, ArrowRight, User, Eye, EyeOff, Droplet, Moon, Dumbbell, Quote, GraduationCap, Download, Trash2, Lock, Settings, Plus, Check, ListChecks, ClipboardList, History, Sparkles, Flower2, Upload, RefreshCw, Image as ImageIcon, Smile, Meh, Frown, Monitor, TrendingUp, CalendarDays, RotateCcw, X, AlertCircle, Wallet, CreditCard, Receipt, PiggyBank, ArrowUpRight, ArrowDownLeft, ImagePlus, Palette, PieChart, BarChart3, Calculator, AlertTriangle, HeartPulse, Utensils, Flame, Activity, Coffee, Play, CalendarClock, BookCopy, FileUp, Footprints, NotebookPen, DownloadCloud
    } from 'lucide-react';

    const THEMES = {
      jacaranda: { main: '#9B5DE5', sec: '#BE95C4', dark: '#5E548E', bg: '#FCF8FF', surface: '#F7EFFF', accent: '#E0B1CB' },
      prada: { main: '#D90429', sec: '#8D0801', dark: '#111111', bg: '#F9F9F9', surface: '#F0F0F0', accent: '#EF233C' },
      matcha: { main: '#588157', sec: '#A3B18A', dark: '#344E41', bg: '#FAFAED', surface: '#F1F4E8', accent: '#DAD7CD' }
    };

    const DAYS_OF_WEEK = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    const SHORT_DAYS = [ {id:1, label:'L', name:'Lunes'}, {id:2, label:'M', name:'Martes'}, {id:3, label:'M', name:'Miércoles'}, {id:4, label:'J', name:'Jueves'}, {id:5, label:'V', name:'Viernes'}, {id:6, label:'S', name:'Sábado'} ];

    const GYM_CATALOG = [
      { id: 'TI1', name: 'Sentadilla libre', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TI2', name: 'Puente de glúteos', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 26 },
      { id: 'TI3', name: 'Extension de pierna maquina', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 14 },
      { id: 'TI4', name: 'Desplante en máquina Smith', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TI5', name: 'Adduccion en maquina', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 14 },
      { id: 'TI6', name: 'Curl Femoral Tumbado', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 8 },
      { id: 'TI7', name: 'Hiperextensiones (en banco a 45°)', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TI8', name: 'Paso del granjero', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 4 },
      { id: 'TI9', name: 'Peso muerto Rumano', target: 'Tren Inferior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS1', name: 'Dominada Supina', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS2', name: 'Dominada Prona', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS3', name: 'Fondos (en barras paralelas)', target: 'Tren Superior', defaultSeries: 2, defaultReps: 13 },
      { id: 'TS4', name: 'Press de Pecho Vertical', target: 'Tren Superior', defaultSeries: 2, defaultReps: 12 },
      { id: 'TS5', name: 'Jalón unilateral en polea, sentado', target: 'Tren Superior', defaultSeries: 2, defaultReps: 15 },
      { id: 'TS6', name: 'Curl predicador con mancuerna', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS7', name: 'Extensión de tríceps sobre la cabeza', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'TS8', name: 'Push-ups / Flexiones', target: 'Tren Superior', defaultSeries: 2, defaultReps: 10 },
      { id: 'AB1', name: 'Crunch abdominal', target: 'Abdomen', defaultSeries: 3, defaultReps: 15 },
      { id: 'AB2', name: 'Elevación de piernas', target: 'Abdomen', defaultSeries: 3, defaultReps: 12 },
      { id: 'AB3', name: 'Plancha (Segundos)', target: 'Abdomen', defaultSeries: 3, defaultReps: 45 },
      { id: 'AB4', name: 'Giro Ruso (Russian Twist)', target: 'Abdomen', defaultSeries: 3, defaultReps: 20 }
    ];

    // --- COMPONENTE DE GRÁFICA DE LÍNEA (TIPO CARDIO) ---
    const LineChart = ({ data, labels, color, maxVal, height = "h-24", unit = "" }) => {
       const max = maxVal || Math.max(...data, 1);
       
       const points = data.map((val, idx) => {
          const x = (idx / (Math.max(data.length - 1, 1))) * 100;
          const y = 100 - ((val / max) * 100);
          return `${x},${y}`;
       }).join(" ");

       return (
          <div className={`w-full ${height} flex flex-col`}>
             <div className="flex-1 relative w-full pt-3 pb-3 px-2">
                <svg className="w-full h-full overflow-visible" preserveAspectRatio="none" viewBox="0 0 100 100">
                   {/* Línea Principal */}
                   <polyline 
                     points={points} 
                     fill="none" 
                     stroke={color} 
                     strokeWidth="2.5" 
                     vectorEffect="nonScalingStroke" 
                     strokeLinecap="round" 
                     strokeLinejoin="round" 
                     className="drop-shadow-sm"
                   />
                   {/* Puntos (Nodos) */}
                   {data.map((val, idx) => {
                      const x = (idx / (Math.max(data.length - 1, 1))) * 100;
                      const y = 100 - ((val / max) * 100);
                      return (
                         <circle 
                           key={idx} 
                           cx={x} cy={y} r="4" 
                           fill="white" 
                           stroke={color} 
                           strokeWidth="2" 
                           vectorEffect="nonScalingStroke" 
                           className="transition-all hover:r-[6px] cursor-pointer shadow-sm"
                         >
                           <title>{labels[idx]}: {val} {unit}</title>
                         </circle>
                      )
                   })}
                </svg>
             </div>
             {/* Eje X (Etiquetas) */}
             <div className="flex justify-between w-full mt-2 px-1">
                {labels.map((l, idx) => {
                   const dObj = new Date(l + 'T12:00:00');
                   const dayStr = dObj.getDate().toString().padStart(2, '0');
                   const showLabel = labels.length <= 7 || idx % Math.ceil(labels.length/7) === 0 || idx === labels.length - 1;
                   return (
                     <span key={idx} className={`text-[7px] text-slate-400 font-bold ${showLabel ? 'opacity-100' : 'opacity-0'}`}>
                        {dayStr}
                     </span>
                   )
                })}
             </div>
          </div>
       );
    };

    // --- NUEVO COMPONENTE: MULTI-LINE CHART ESTILO BUJO ---
    const MultiLineChart = ({ datasets, labels, height = "h-48" }) => {
       return (
          <div className={`w-full ${height} flex flex-col`}>
             {/* Leyenda de colores */}
             <div className="flex flex-wrap gap-3 justify-center mb-4">
                {datasets.map((ds, i) => (
                   <div key={i} className="flex items-center gap-1.5 bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-100">
                      <span className="w-3 h-3 rounded-full shadow-inner" style={{ backgroundColor: ds.color }}></span>
                      <span className="text-[9px] font-bold text-slate-600 uppercase tracking-widest">{ds.label}</span>
                   </div>
                ))}
             </div>
             
             {/* Gráfica con cuadrícula de libreta */}
             <div className="flex-1 relative w-full pt-6 pb-6 px-4 bg-[#FCF8FF] rounded-[2rem] border border-purple-50 shadow-inner overflow-hidden">
                <div className="absolute inset-0 pointer-events-none opacity-30" style={{ backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '20px 20px', backgroundPosition: 'center center' }}></div>
                
                <svg className="w-full h-full overflow-visible relative z-10" preserveAspectRatio="none" viewBox="0 0 100 100">
                   {datasets.map((ds, dsIdx) => {
                      const offset = (dsIdx * 3) - (datasets.length * 1.5); 
                      const points = ds.data.map((val, idx) => {
                         const x = (idx / (Math.max(ds.data.length - 1, 1))) * 100;
                         const baseY = 100 - (val * 100); 
                         const clampedY = Math.max(5, Math.min(95, baseY));
                         const y = clampedY + offset;
                         return `${x},${y}`;
                      }).join(" ");

                      return (
                         <g key={dsIdx}>
                            <polyline points={points} fill="none" stroke={ds.color} strokeWidth="3" vectorEffect="nonScalingStroke" strokeLinecap="round" strokeLinejoin="round" opacity="0.8" className="drop-shadow-md" />
                            {ds.data.map((val, idx) => {
                               const x = (idx / (Math.max(ds.data.length - 1, 1))) * 100;
                               const baseY = 100 - (val * 100);
                               const clampedY = Math.max(5, Math.min(95, baseY));
                               const y = clampedY + offset;
                               return (
                                  <circle key={idx} cx={x} cy={y} r="5" fill="white" stroke={ds.color} strokeWidth="2.5" vectorEffect="nonScalingStroke" className="transition-all hover:r-[7px] cursor-pointer shadow-sm">
                                    <title>{ds.label}: {val ? 'Completado' : 'Pendiente'}</title>
                                  </circle>
                                )
                            })}
                         </g>
                      );
                   })}
                </svg>
             </div>
             {/* Fechas eje X */}
             <div className="flex justify-between w-full mt-3 px-2">
                {labels.map((l, idx) => {
                   const dObj = new Date(l + 'T12:00:00');
                   const dayStr = dObj.getDate().toString().padStart(2, '0');
                   const showLabel = labels.length <= 7 || idx % Math.ceil(labels.length/7) === 0 || idx === labels.length - 1;
                   return <span key={idx} className={`text-[9px] text-slate-400 font-bold ${showLabel ? 'opacity-100' : 'opacity-0'}`}>{dayStr}</span>
                })}
             </div>
          </div>
       );
    };

    const App = () => {
      // --- ESTADOS PRINCIPALES ---
      const [viewMode, setViewMode] = useState('welcome'); 
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [isPrivateMode, setIsPrivateMode] = useState(false);
      const [coverImage, setCoverImage] = useState(localStorage.getItem('bitacora_cover_img') || null);
      
      const [showResetModal, setShowResetModal] = useState(false);
      const [showFactoryResetModal, setShowFactoryResetModal] = useState(false);
      const [toastMsg, setToastMsg] = useState(null);
      const [currentCalMonth, setCurrentCalMonth] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
      const [showEventModal, setShowEventModal] = useState({ show: false, date: null, text: '' });
      const [scheduleModal, setScheduleModal] = useState({ show: false, itemType: null, itemId: null, itemName: '', date: selectedDate });
      
      const [showExpenseModal, setShowExpenseModal] = useState(false);
      const [showFixedModal, setShowFixedModal] = useState(false);
      const [showGymModal, setShowGymModal] = useState(false);
      const [showGroupModal, setShowGroupModal] = useState(false); 
      const [customExName, setCustomExName] = useState(''); 
      
      const [showImportModal, setShowImportModal] = useState(false);
      const [importType, setImportType] = useState('topics'); 
      const [importText, setImportText] = useState("");

      const [editingGroup, setEditingGroup] = useState(null);
      const [groupToDelete, setGroupToDelete] = useState(null);
      const fileInputRef = useRef(null);

      // Formularios
      const [expForm, setExpForm] = useState({ amount: '', concept: '', accountId: '' });
      const [fixForm, setFixForm] = useState({ name: '', amount: '', current: '', total: '', accountId: '' });
      const [accForm, setAccForm] = useState({ name: '', cut: '', pay: '' });
      const [groupForm, setGroupForm] = useState({ name: '', subj: '', schedule: [] });
      const [newQuote, setNewQuote] = useState(''); 
      const [manualEntry, setManualEntry] = useState({ topics: '', adas: '' });
      
      const [chartRange, setChartRange] = useState('week'); 

      // --- PERSISTENCIA BLINDADA V23 ---
      const [groups, setGroups] = useState(() => {
        const saved = localStorage.getItem('bitacora_grupos_v23') || localStorage.getItem('bitacora_grupos_v22') || localStorage.getItem('bitacora_grupos_v21') || localStorage.getItem('bitacora_grupos_v20') || localStorage.getItem('bitacora_grupos_v19');
        if (saved) {
          try {
             return JSON.parse(saved).map(g => {
                let groupSchedule = g.schedule || [];
                if (groupSchedule.length === 0 && g.days && g.days.length > 0) { groupSchedule = g.days.map(d => ({ day: d, time: g.time || '08:00' })); }
                return { ...g, schedule: groupSchedule, topics: g.topics || [], adas: g.adas || [], sessions: g.sessions || [], tasks: g.tasks || [] };
             });
          } catch(e) { return []; }
        }
        return [{ id: 'G1', name: 'Grupo 101', subject: 'Diseño Urbano I', color: '#BE95C4', schedule: [{day: 'Lunes', time: '08:00'}, {day: 'Miércoles', time: '10:00'}], topics: [{ id: 1, title: 'Introducción al Urbanismo Sistémico', completed: false }], adas: [{ id: 101, title: 'ADA 1: Mapa Conceptual', completed: false }], sessions: [], tasks: [] }];
      });

      const [personalData, setPersonalData] = useState(() => {
        const saved = localStorage.getItem('bitacora_personal_v23') || localStorage.getItem('bitacora_personal_v22') || localStorage.getItem('bitacora_personal_v21') || localStorage.getItem('bitacora_personal_v20') || localStorage.getItem('bitacora_personal_v19');
        const baseData = {
          appTitle: 'Agenda - Bitácora', theme: 'jacaranda', 
          waterLogs: {}, sleepLogs: {}, stepsLogs: {}, savingsLogs: {}, sleep: { start: '22:00', end: '06:00' }, 
          tasks: [], quotes: ["La arquitectura es música congelada."], activeQuoteIndex: 0,
          habitMatrix: {}, moodLogs: {}, calendarEvents: {},
          finance: { accounts: [{ id: 'A1', name: 'Banorte', type: 'Crédito', cutDate: '15', payDate: '05' }, { id: 'A2', name: 'Efectivo (Billetera)', type: 'Efectivo', cutDate: '-', payDate: '-' }], transactions: [], fixedPayments: [] },
          health: { meals: {}, workouts: {} }
        };
        
        if (saved) {
           try {
              const parsed = JSON.parse(saved);
              const safeFinance = { 
                 accounts: Array.isArray(parsed.finance?.accounts) ? parsed.finance.accounts : baseData.finance.accounts, 
                 transactions: Array.isArray(parsed.finance?.transactions) ? parsed.finance.transactions : [], 
                 fixedPayments: Array.isArray(parsed.finance?.fixedPayments) ? parsed.finance.fixedPayments : [] 
              };
              if (!safeFinance.accounts.some(a => a?.name?.includes('Efectivo'))) { 
                 safeFinance.accounts.push({ id: 'A2', name: 'Efectivo (Billetera)', type: 'Efectivo', cutDate: '-', payDate: '-' }); 
              }
              
              const safeTasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
              const safeQuotes = Array.isArray(parsed.quotes) && parsed.quotes.length > 0 ? parsed.quotes : baseData.quotes;

              return { 
                ...baseData, 
                ...parsed, 
                finance: safeFinance, 
                appTitle: parsed.appTitle || 'Agenda - Bitácora',
                waterLogs: parsed.waterLogs || {}, 
                sleepLogs: parsed.sleepLogs || {}, 
                stepsLogs: parsed.stepsLogs || {}, 
                savingsLogs: parsed.savingsLogs || {},
                health: parsed.health || { meals: {}, workouts: {} }, 
                tasks: safeTasks,
                moodLogs: parsed.moodLogs || {},
                habitMatrix: parsed.habitMatrix || {},
                quotes: safeQuotes,
                calendarEvents: parsed.calendarEvents || {}
              };
           } catch(e) {
              return baseData;
           }
        }
        return baseData;
      });

      const [activeGroupId, setActiveGroupId] = useState(groups[0]?.id);

      useEffect(() => { localStorage.setItem('bitacora_grupos_v23', JSON.stringify(groups)); }, [groups]);
      useEffect(() => { localStorage.setItem('bitacora_personal_v23', JSON.stringify(personalData)); }, [personalData]);
      useEffect(() => { document.title = personalData.appTitle || 'Agenda - Bitácora'; }, [personalData.appTitle]);

      const activeTheme = THEMES[personalData.theme || 'jacaranda'];
      const activeGroup = useMemo(() => groups.find(g => g.id === activeGroupId), [groups, activeGroupId]);
      
      const getDaysArray = (numDays) => {
         const arr = [];
         const today = new Date(selectedDate + 'T12:00:00');
         for (let i = numDays - 1; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(today.getDate() - i);
            arr.push(d.toISOString().split('T')[0]);
         }
         return arr;
      };

      const chartDays = useMemo(() => {
         return chartRange === 'week' ? getDaysArray(7) : getDaysArray(30);
      }, [selectedDate, chartRange]);

      const currentDayName = useMemo(() => {
         const d = new Date(selectedDate + 'T12:00:00');
         return DAYS_OF_WEEK[d.getDay()];
      }, [selectedDate]);

      // Calculo de semana actual (Lunes a Domingo) para Bujo (Habit Matrix visual)
      const weekDays = useMemo(() => {
        const dt = new Date(selectedDate + 'T12:00:00');
        const day = dt.getDay();
        const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(dt.setDate(diff));
        return Array.from({length: 7}, (_, i) => {
          const d = new Date(monday); d.setDate(monday.getDate() + i);
          return d.toISOString().split('T')[0];
        });
      }, [selectedDate]);

      const groupsToday = useMemo(() => {
         return groups.filter(g => {
            const hasSessionToday = (g.sessions || []).some(s => s.date === selectedDate);
            const isScheduledForToday = (g.schedule || []).some(s => s.day === currentDayName);
            return hasSessionToday || isScheduledForToday;
         }).map(g => {
            const scheduledTime = g.schedule?.find(s => s.day === currentDayName)?.time;
            const todayTime = scheduledTime || g.time || '08:00'; 
            return { ...g, todayTime };
         }).sort((a,b) => a.todayTime.localeCompare(b.todayTime));
      }, [groups, selectedDate, currentDayName]);

      const globalPendingTasks = useMemo(() => {
        return groups.flatMap(g => (g.tasks || []).filter(t => !t.done).map(t => ({ ...t, groupName: g.name, color: g.color, groupId: g.id })));
      }, [groups]);

      const formatSchedule = (scheduleArr) => {
         if(!scheduleArr || scheduleArr.length === 0) return 'Sin horario programado';
         return scheduleArr.map(s => `${s.day.substring(0,2)} ${s.time}`).join(' • ');
      };

      const calculateSleepHours = (start, end) => {
         if(!start || !end) return 0;
         const [sh, sm] = start.split(':').map(Number);
         const [eh, em] = end.split(':').map(Number);
         let hours = eh - sh;
         let mins = em - sm;
         if (hours < 0) hours += 24;
         if (mins < 0) { mins += 60; hours -= 1; }
         return Number((hours + (mins / 60)).toFixed(1));
      };

      const handleSleepChange = (type, val) => {
         setPersonalData(p => {
            const newSleep = { ...(p.sleep||{}), [type]: val };
            const hrs = calculateSleepHours(newSleep.start, newSleep.end);
            return { ...p, sleep: newSleep, sleepLogs: { ...(p.sleepLogs || {}), [selectedDate]: hrs } };
         });
      };

      // --- ACCIONES SALUD & GYM ---
      const setMeal = (type, value) => { setPersonalData(prev => ({ ...prev, health: { ...prev.health, meals: { ...(prev.health?.meals || {}), [selectedDate]: { ...((prev.health?.meals || {})[selectedDate] || {}), [type]: value } } } })); };
      const setWorkoutGeneral = (field, value) => { setPersonalData(prev => ({ ...prev, health: { ...prev.health, workouts: { ...(prev.health?.workouts || {}), [selectedDate]: { ...((prev.health?.workouts || {})[selectedDate] || { exercises: [] }), [field]: value } } } })); };
      const loadRoutine = (target) => { const routineExercises = GYM_CATALOG.filter(e => e.target === target).map(e => ({ id: Date.now() + Math.random(), name: e.name, series: e.defaultSeries, reps: e.defaultReps, weight: 0, done: false })); setPersonalData(prev => { const currentDay = (prev.health?.workouts || {})[selectedDate] || { exercises: [] }; return { ...prev, health: { ...prev.health, workouts: { ...(prev.health?.workouts || {}), [selectedDate]: { ...currentDay, type: target, exercises: [...currentDay.exercises, ...routineExercises] } } } }; }); showToast(`Rutina de ${target} cargada`); };
      const updateGymExercise = (exId, field, value) => { setPersonalData(prev => { const currentDay = (prev.health?.workouts || {})[selectedDate]; if (!currentDay) return prev; return { ...prev, health: { ...prev.health, workouts: { ...(prev.health?.workouts || {}), [selectedDate]: { ...currentDay, exercises: (currentDay.exercises||[]).map(ex => ex.id === exId ? { ...ex, [field]: value } : ex) } } } }; }); };

                          <div className="space-y-2 pt-3 border-t border-slate-200">
                             {groupForm.schedule.map(s => (
                                <div key={`add-${s.day}`} className="flex items-center justify-between gap-3 bg-white p-2 px-4 rounded-xl border border-slate-100 shadow-sm"><span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">{s.day}</span><div className="flex items-center gap-2"><Clock size={14} className="text-slate-400"/><input type="time" value={s.time} onChange={e => updateGroupFormTime(s.day, e.target.value)} className="bg-transparent focus:outline-none text-sm font-bold text-indigo-500 w-24 text-right" /></div></div>
                             ))}
                          </div>
                       )}
                    </div>
                  </div>
                  <div className="flex gap-4 mt-8"><button onClick={() => {setShowGroupModal(false); setGroupForm({name:'', subj:'', schedule:[]});}} className="flex-1 p-4 rounded-xl font-bold text-[10px] text-slate-400 hover:bg-slate-50 uppercase tracking-widest">Cancelar</button><button onClick={addNewGroup} className="flex-1 p-4 rounded-xl font-bold text-[10px] bg-indigo-500 text-white shadow-lg uppercase tracking-widest hover:bg-indigo-600 transition-colors">Crear</button></div>
               </div>
            </div>
          )}

          {scheduleModal.show && (<div className="fixed inset-0 z-[70] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6"><div className="bg-white w-full max-w-sm p-8 rounded-[3rem] shadow-2xl"><h3 className="text-2xl font-serif font-bold text-theme-dark italic mb-6 text-center">Programar para...</h3><input type="date" value={scheduleModal.date} onChange={e=>setScheduleModal({...scheduleModal, date: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl border-none mb-6 text-center font-bold text-theme-main"/><div className="flex gap-4"><button onClick={()=>setScheduleModal({show:false})} className="flex-1 p-4 rounded-xl font-bold text-[10px] text-slate-400 uppercase tracking-widest">Cancelar</button><button onClick={()=>{addSession(scheduleModal.itemType, scheduleModal.itemId, scheduleModal.date); setScheduleModal({show:false})}} className="flex-1 p-4 rounded-xl font-bold text-[10px] bg-theme-main text-white uppercase tracking-widest">Aceptar</button></div></div></div>)}
          {showEventModal.show && (<div className="fixed inset-0 z-[70] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6"><div className="bg-white w-full max-w-sm p-8 rounded-[3rem] shadow-2xl"><h3 className="text-2xl font-serif font-bold text-theme-dark italic mb-2">Añadir Evento</h3><p className="text-xs text-slate-400 mb-6 uppercase tracking-widest">{showEventModal.date}</p><textarea className="w-full h-32 p-4 bg-slate-50 rounded-2xl focus:outline-none text-sm italic shadow-inner resize-none text-slate-700" placeholder="Ej. Examen Parcial..." value={showEventModal.text} onChange={(e) => setShowEventModal({...showEventModal, text: e.target.value})}></textarea><div className="flex gap-4 mt-6"><button onClick={() => setShowEventModal({show:false, date:null, text:''})} className="flex-1 p-4 rounded-xl font-bold text-[10px] text-slate-400 uppercase tracking-widest">Cancelar</button><button onClick={saveCalendarEvent} className="flex-1 p-4 rounded-xl font-bold text-[10px] bg-theme-main text-white uppercase tracking-widest shadow-lg">Guardar</button></div></div></div>)}
          {showResetModal && (<div className="fixed inset-0 z-[70] bg-red-900/40 backdrop-blur-md flex items-center justify-center p-6"><div className="bg-white w-full max-w-md p-10 rounded-[3rem] shadow-2xl text-center"><AlertCircle size={60} className="text-red-400 mx-auto mb-6" /><h3 className="text-3xl font-serif font-bold text-slate-800 italic mb-4">¿Fin del Ciclo?</h3><p className="text-sm text-slate-500 mb-8 italic leading-relaxed">Se limpiará la bitácora y sesiones de este grupo. Tus catálogos de Temas y ADAs se conservarán.</p><div className="flex gap-4"><button onClick={() => setShowResetModal(false)} className="flex-1 p-5 rounded-2xl font-bold text-[11px] text-slate-500 bg-slate-100 uppercase tracking-widest">Cancelar</button><button onClick={() => { setGroups(prev => prev.map(g => g.id === activeGroupId ? {...g, topics: (g.topics||[]).map(t=>({...t, completed:false})), adas: (g.adas||[]).map(a=>({...a, completed:false})), sessions: [], tasks: []} : g)); setShowResetModal(false); showToast("Ciclo reseteado"); }} className="flex-1 p-5 rounded-2xl font-bold text-[11px] bg-red-400 text-white uppercase tracking-widest shadow-lg">Resetear</button></div></div></div>)}
          {groupToDelete && (<div className="fixed inset-0 z-[70] bg-red-900/40 backdrop-blur-md flex items-center justify-center p-6"><div className="bg-white w-full max-w-md p-10 rounded-[3rem] shadow-2xl text-center"><AlertCircle size={60} className="text-red-400 mx-auto mb-6" /><h3 className="text-3xl font-serif font-bold text-slate-800 italic mb-4">¿Eliminar {groupToDelete.name}?</h3><p className="text-sm text-slate-500 mb-8">Esta acción es irreversible. Se perderán todos sus temas, ADAs y notas asociadas.</p><div className="flex gap-4"><button onClick={() => setGroupToDelete(null)} className="flex-1 p-5 rounded-2xl font-bold text-[11px] text-slate-500 bg-slate-100 uppercase tracking-widest">Cancelar</button><button onClick={deleteGroup} className="flex-1 p-5 rounded-2xl font-bold text-[11px] bg-red-400 text-white uppercase tracking-widest shadow-lg">Sí, eliminar</button></div></div></div>)}
          {showFactoryResetModal && (<div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-6 animate-in zoom-in duration-200"><div className="bg-white w-full max-w-sm p-10 rounded-[3rem] shadow-2xl text-center"><div className="mx-auto w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-400 mb-6 shadow-inner"><Lock size={24} /></div><h3 className="text-2xl font-serif font-bold text-slate-800 italic mb-2">Restablecer Agenda</h3><p className="text-[10px] text-slate-400 mb-6 uppercase tracking-widest font-bold">Requiere Autenticación</p><input type="password" id="resetPinInput" placeholder="PIN..." className="w-full p-4 mb-6 bg-slate-50 rounded-2xl text-center text-lg font-bold tracking-[0.5em] text-slate-700 focus:outline-none focus:ring-2 focus:ring-theme-surface shadow-inner" maxLength={4}/><div className="flex gap-4"><button onClick={() => setShowFactoryResetModal(false)} className="flex-1 p-4 rounded-xl font-bold text-[10px] text-slate-400 hover:bg-slate-50 uppercase tracking-widest">Cancelar</button><button onClick={() => { const pin = document.getElementById('resetPinInput').value; if(pin === '0000') handleFactoryReset(); else { showToast("PIN Incorrecto"); document.getElementById('resetPinInput').value = ''; } }} className="flex-1 p-4 rounded-xl font-bold text-[10px] bg-slate-800 text-white uppercase tracking-widest shadow-lg hover:bg-black transition-colors">Verificar</button></div></div></div>)}
          {showExpenseModal && (<div className="fixed inset-0 z-[80] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6"><div className="bg-white w-full max-w-sm p-10 rounded-[4rem] shadow-2xl relative"><button onClick={()=>setShowExpenseModal(false)} className="absolute top-8 right-8 text-slate-400 hover:text-slate-600"><X/></button><h3 className="text-3xl font-serif font-bold text-theme-dark italic mb-2">Capturar Gasto</h3><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8 italic">Para el día: {selectedDate}</p><div className="space-y-4"><div className="relative"><span className="absolute left-4 top-4 font-bold text-slate-400">$</span><input type="number" value={expForm.amount} onChange={e=>setExpForm({...expForm, amount: e.target.value})} placeholder="0.00" className="w-full p-4 pl-10 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-theme-surface text-lg font-bold text-slate-700" /></div><input type="text" value={expForm.concept} onChange={e=>setExpForm({...expForm, concept: e.target.value})} placeholder="Concepto (Ej. Súper...)" className="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm italic text-slate-700" /><select value={expForm.accountId} onChange={e=>setExpForm({...expForm, accountId: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl border-none text-xs font-bold uppercase tracking-widest text-slate-700 focus:outline-none focus:ring-2 focus:ring-theme-surface"><option value="" disabled>Selecciona la cuenta...</option>{(personalData.finance?.accounts || []).map(a => <option key={a.id} value={a.id} className="text-slate-700">{a.name}</option>)}</select><button onClick={() => { if(expForm.amount && expForm.concept && expForm.accountId) { addTransaction(expForm.amount, expForm.concept, expForm.accountId); setShowExpenseModal(false); setExpForm({ amount: '', concept: '', accountId: '' }); } else showToast("Llena los campos y selecciona tarjeta"); }} className="w-full p-5 bg-theme-dark text-white rounded-3xl font-bold text-xs tracking-[0.2em] uppercase shadow-xl hover:scale-105 transition-all mt-4">Guardar Gasto</button></div></div></div>)}
          {showFixedModal && (<div className="fixed inset-0 z-[80] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6"><div className="bg-white w-full max-w-sm p-10 rounded-[4rem] shadow-2xl relative"><button onClick={()=>setShowFixedModal(false)} className="absolute top-8 right-8 text-slate-400 hover:text-slate-600"><X/></button><h3 className="text-3xl font-serif font-bold text-theme-dark italic mb-6">Nuevo Pago MSI</h3><div className="space-y-4"><input type="text" value={fixForm.name} onChange={e=>setFixForm({...fixForm, name: e.target.value})} placeholder="Nombre (Ej. Laptop)" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-semibold text-slate-700" /><div className="relative"><span className="absolute left-4 top-4 font-bold text-slate-400">$</span><input type="number" value={fixForm.amount} onChange={e=>setFixForm({...fixForm, amount: e.target.value})} placeholder="Monto mensual" className="w-full p-4 pl-10 bg-slate-50 rounded-2xl text-sm font-bold text-slate-700" /></div><div className="flex gap-4"><input type="number" value={fixForm.current} onChange={e=>setFixForm({...fixForm, current: e.target.value})} placeholder="Mes actual" className="w-1/2 p-4 bg-slate-50 rounded-2xl text-sm text-slate-700 text-center" /><input type="number" value={fixForm.total} onChange={e=>setFixForm({...fixForm, total: e.target.value})} placeholder="Total meses" className="w-1/2 p-4 bg-slate-50 rounded-2xl text-sm text-slate-700 text-center" /></div><select value={fixForm.accountId} onChange={e=>setFixForm({...fixForm, accountId: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold uppercase tracking-widest text-slate-700 focus:outline-none focus:ring-2 focus:ring-theme-surface"><option value="" disabled>Selecciona la cuenta...</option>{(personalData.finance?.accounts || []).map(a => <option key={a.id} value={a.id} className="text-slate-700">{a.name}</option>)}</select><button onClick={() => { if(fixForm.name && fixForm.amount && fixForm.total && fixForm.accountId) { addFixedPayment(fixForm.name, fixForm.amount, fixForm.total, fixForm.current || 1, fixForm.accountId); setShowFixedModal(false); setFixForm({ name: '', amount: '', current: '', total: '', accountId: '' }); } else showToast("Llena los campos y selecciona tarjeta"); }} className="w-full p-5 bg-theme-sec text-white rounded-3xl font-bold text-xs tracking-widest uppercase shadow-xl mt-4">Programar MSI</button></div></div></div>)}
          {showImportModal && (<div className="fixed inset-0 z-[80] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 animate-in fade-in"><div className="bg-white w-full max-w-lg p-10 rounded-[3rem] shadow-2xl relative"><button onClick={()=>setShowImportModal(false)} className="absolute top-8 right-8 text-slate-400 hover:text-slate-600"><X/></button><h3 className="text-3xl font-serif font-bold text-theme-dark italic mb-2">Importar Datos</h3><p className="text-xs text-slate-400 mb-6 italic">Pega la columna de tu Excel (un tema/ADA por línea)</p><div className="flex gap-4 mb-4"><button onClick={()=>setImportType('topics')} className={`flex-1 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-colors ${importType === 'topics' ? 'bg-theme-main text-white' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>Temas</button><button onClick={()=>setImportType('adas')} className={`flex-1 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-colors ${importType === 'adas' ? 'bg-theme-main text-white' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>ADAs</button></div><textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="Tiro Parabólico&#10;Leyes de Newton&#10;..." className="w-full h-48 bg-slate-50 p-4 rounded-2xl text-sm italic focus:outline-none focus:ring-2 focus:ring-theme-surface text-slate-600 custom-scrollbar resize-none mb-4"></textarea><button onClick={handleImport} className="w-full p-4 bg-theme-dark text-white rounded-2xl font-bold text-[11px] tracking-widest uppercase shadow-md hover:scale-105 transition-all">Importar Lista</button></div></div>)}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
